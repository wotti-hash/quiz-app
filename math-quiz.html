<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>算数クイズ｜中学受験対策</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fef9f0;
  --card: #ffffff;
  --text: #2d2a26;
  --sub: #8a8070;
  --accent1: #ff6b35;
  --accent2: #4ecdc4;
  --accent3: #ffe66d;
  --accent4: #a8e6cf;
  --lv1: #4ecdc4;
  --lv2: #ff9f43;
  --lv3: #ff6b35;
  --lv4: #e84393;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* 背景装飾 */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(circle at 10% 20%, #ffe66d33 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, #4ecdc433 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, #ff6b3511 0%, transparent 60%);
  pointer-events: none;
}

.wrap { max-width: 520px; margin: 0 auto; padding: 0 16px 60px; position: relative; z-index: 1; }

/* ヘッダー */
.header { text-align: center; padding: 32px 0 20px; }
.header-icon { font-size: 52px; animation: bounce 2s infinite; display: block; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.header h1 { font-family: 'Kaisei Decol', serif; font-size: 26px; font-weight: 700; color: var(--text); margin: 8px 0 4px; }
.header p { font-size: 12px; color: var(--sub); }

/* カード */
.card { background: var(--card); border-radius: 20px; padding: 20px; margin-top: 14px; box-shadow: var(--shadow); }

/* レベルボタン */
.level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
.lv-btn { border: 3px solid transparent; border-radius: 14px; padding: 14px 10px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 13px; color: #fff; text-align: left; transition: all 0.25s; position: relative; overflow: hidden; opacity: 0.55; }
.lv-btn:hover { opacity: 0.8; transform: translateY(-1px); }
.lv-btn.active { opacity: 1; transform: scale(1.04); box-shadow: 0 6px 24px rgba(0,0,0,0.22); border-color: #fff; }
.lv-btn.active::before { content: '✓'; position: absolute; top: 8px; right: 10px; font-size: 16px; font-weight: 900; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
.lv-btn .lv-name { font-size: 15px; display: block; }
.lv-btn .lv-desc { font-size: 11px; opacity: 0.9; margin-top: 3px; display: block; font-weight: 400; }
.lv-btn[data-lv="1"] { background: linear-gradient(135deg, #4ecdc4, #26a0da); }
.lv-btn[data-lv="2"] { background: linear-gradient(135deg, #ff9f43, #ffd32a); }
.lv-btn[data-lv="3"] { background: linear-gradient(135deg, #ff6b35, #ff4757); }
.lv-btn[data-lv="4"] { background: linear-gradient(135deg, #e84393, #9b59b6); }

/* カテゴリボタン */
.cat-wrap { display: flex; flex-wrap: wrap; gap: 7px; margin: 8px 0 4px; }
.cat-btn { border-radius: 20px; border: 2px solid #e0d8cc; background: transparent; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 700; padding: 5px 12px; cursor: pointer; color: var(--sub); transition: all 0.2s; }
.cat-btn.active { background: var(--text); border-color: var(--text); color: #fff; }

/* スタートボタン */
.start-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; background: linear-gradient(135deg, var(--accent1), #ff4757); color: #fff; font-family: 'Kaisei Decol', serif; font-size: 20px; font-weight: 700; cursor: pointer; margin-top: 14px; box-shadow: 0 4px 16px rgba(255,107,53,0.4); transition: all 0.2s; letter-spacing: 1px; }
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,107,53,0.5); }

/* 進捗バー */
.progress-wrap { margin: 16px 0 4px; }
.progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--sub); margin-bottom: 6px; }
.progress-bar { height: 8px; background: #ede8df; border-radius: 4px; }
.progress-fill { height: 8px; border-radius: 4px; transition: width 0.5s; background: linear-gradient(90deg, var(--accent2), var(--accent1)); }

/* 問題カード */
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.quiz-cat-badge { font-size: 11px; padding: 4px 10px; border-radius: 10px; font-weight: 700; color: #fff; }
.quiz-lv-badge { font-size: 11px; padding: 4px 10px; border-radius: 10px; font-weight: 700; }
.quiz-emoji { font-size: 36px; text-align: center; margin: 8px 0; }

/* 問題文（穴埋め）表示 */
.question-area { background: #f8f5ef; border-radius: 14px; padding: 18px; margin: 12px 0; }
.question-text { font-size: 16px; line-height: 2.2; font-weight: 700; text-align: center; color: var(--text); }
.blank-box { display: inline-block; min-width: 52px; height: 36px; border-radius: 8px; border: 2px dashed var(--accent1); background: #fff; vertical-align: middle; text-align: center; line-height: 32px; font-size: 18px; font-weight: 900; color: var(--accent1); padding: 0 6px; cursor: text; }
.blank-box.answered { border-style: solid; background: #fff8f5; }
.blank-box.correct-ans { border-color: #22c55e; background: #f0fdf4; color: #16a34a; }
.blank-box.wrong-ans { border-color: #ef4444; background: #fef2f2; color: #dc2626; }

/* 入力エリア */
.input-area { display: flex; gap: 10px; align-items: center; margin: 14px 0 6px; }
.num-input { flex: 1; height: 52px; border: 2px solid #e0d8cc; border-radius: 12px; font-size: 22px; font-weight: 900; text-align: center; font-family: 'Kaisei Decol', serif; color: var(--text); background: #fff; outline: none; transition: border-color 0.2s; }
.num-input:focus { border-color: var(--accent1); }
.num-input.correct { border-color: #22c55e; background: #f0fdf4; }
.num-input.wrong { border-color: #ef4444; background: #fef2f2; }
.submit-btn { height: 52px; padding: 0 22px; border: none; border-radius: 12px; background: var(--accent1); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; transition: all 0.2s; }
.submit-btn:disabled { opacity: 0.5; cursor: default; }
.submit-btn:not(:disabled):hover { background: #ff4757; }

/* 固定入力バー */
.input-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: #fff; border-top: 1px solid #ede8df;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.10);
  padding: 10px 16px 10px; }
.num-input-bar { display: block; width: 100%; height: 48px; border: 2px solid #e0d8cc; border-radius: 12px;
  font-size: 24px; font-weight: 900; text-align: center; font-family: 'Kaisei Decol', serif;
  color: var(--text); background: #fff; outline: none; transition: border-color 0.2s;
  margin-bottom: 8px; -moz-appearance: textfield; }
.num-input-bar::-webkit-outer-spin-button,
.num-input-bar::-webkit-inner-spin-button { -webkit-appearance: none; }
.num-input-bar:focus { border-color: var(--accent1); }
.num-input-bar.correct { border-color: #22c55e; background: #f0fdf4; }
.num-input-bar.wrong   { border-color: #ef4444; background: #fef2f2; }
.submit-bar-btn { display: block; width: 100%; height: 48px; border: none; border-radius: 12px;
  background: var(--accent1); color: #fff; font-size: 17px; font-weight: 700;
  cursor: pointer; font-family: 'Kaisei Decol', serif; transition: all 0.2s; margin-bottom: 8px;
  letter-spacing: 1px; }
.submit-bar-btn:disabled { opacity: 0.45; cursor: default; }
.submit-bar-btn:not(:disabled):hover { background: #ff4757; }
.numpad-bar { display: grid; grid-template-columns: repeat(5,1fr); gap: 5px; }
.numpad-bar button { padding: 8px 4px; border: 1.5px solid #e0d8cc; border-radius: 9px;
  background: #f8f5ef; font-size: 17px; font-weight: 700; cursor: pointer;
  font-family: 'Kaisei Decol', serif; color: var(--text); transition: all 0.12s; line-height: 1; }
.numpad-bar button:active { background: var(--accent1); border-color: var(--accent1); color: #fff; transform: scale(0.95); }
.numpad-bar .del-btn { font-size: 14px; }
/* クイズ画面のbottomに余白（固定バーの高さ分） */
#quizScreen { padding-bottom: 140px; }

/* ヒントボタン */
.hint-btn { background: transparent; border: 2px solid #e0d8cc; border-radius: 10px; padding: 6px 14px; font-size: 12px; font-weight: 700; color: var(--sub); cursor: pointer; transition: all 0.2s; }
.hint-btn:hover { border-color: var(--accent3); color: #b8900a; }
.hint-box { background: #fffbeb; border: 1.5px solid var(--accent3); border-radius: 12px; padding: 12px 14px; font-size: 13px; color: #92680a; line-height: 1.7; margin-top: 10px; }

/* 解説ボックス */
.exp-box { border-radius: 16px; padding: 16px; margin-top: 12px; border: none; }
.exp-box.correct-box { background: linear-gradient(135deg, #f0fdf4, #dcfce7); }
.exp-box.wrong-box { background: linear-gradient(135deg, #fef2f2, #fee2e2); }
.exp-result { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
.exp-result.ok { color: #16a34a; }
.exp-result.ng { color: #dc2626; }
.exp-title { font-size: 12px; font-weight: 700; color: var(--sub); margin: 10px 0 6px; text-transform: uppercase; letter-spacing: 1px; }
.exp-steps { background: rgba(255,255,255,0.7); border-radius: 10px; padding: 12px 14px; font-size: 13px; line-height: 2; }
.exp-steps .step { display: flex; gap: 8px; margin-bottom: 4px; }
.step-num { min-width: 22px; height: 22px; border-radius: 50%; background: var(--accent1); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.wiki-link { display: inline-block; margin-top: 10px; font-size: 11px; color: var(--accent2); text-decoration: none; border: 1px solid var(--accent2); padding: 3px 10px; border-radius: 6px; }

/* 縦分数表示 */
.frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 3px; line-height: 1.1; }
.frac .fn { border-bottom: 2.5px solid currentColor; padding: 0 3px 1px; font-size: 0.85em; }
.frac .fd { padding: 1px 3px 0; font-size: 0.85em; }

/* 次へボタン */
.next-btn { width: 100%; padding: 14px; border: none; border-radius: 14px; background: linear-gradient(135deg, var(--accent2), #26a0da); color: #fff; font-family: 'Kaisei Decol', serif; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 12px; letter-spacing: 1px; transition: all 0.2s; }
.next-btn:hover { transform: translateY(-2px); }

/* 結果画面 */
.result-hero { text-align: center; padding: 28px 0 16px; }
.result-icon { font-size: 64px; }
.result-score { font-family: 'Kaisei Decol', serif; font-size: 52px; font-weight: 700; color: var(--accent1); line-height: 1; margin: 8px 0; }
.result-sub { font-size: 14px; color: var(--sub); }
.perfect-banner { background: linear-gradient(135deg, #ffe66d, #ffb347); border-radius: 12px; padding: 10px 16px; font-size: 14px; font-weight: 700; color: #7a4f00; margin-top: 12px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 6px 0; }
.stat-item { background: var(--bg); border-radius: 12px; padding: 12px; text-align: center; }
.stat-num { font-family: 'Kaisei Decol', serif; font-size: 28px; font-weight: 700; }
.stat-lbl { font-size: 11px; color: var(--sub); margin-top: 2px; }
.cat-bar-wrap { margin-bottom: 10px; }
.cat-bar-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
.cat-bar-track { height: 8px; background: #ede8df; border-radius: 4px; }
.cat-bar-fill { height: 8px; border-radius: 4px; background: linear-gradient(90deg, var(--accent2), var(--accent1)); transition: width 1s; }
.log-row { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f0ebe2; font-size: 12px; line-height: 1.6; }
.log-q { flex: 1; }
.log-ans { color: var(--sub); white-space: nowrap; padding-left: 6px; }
.result-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.btn-retry { padding: 14px; border: none; border-radius: 14px; background: #ef4444; color: #fff; font-family: 'Kaisei Decol', serif; font-size: 17px; cursor: pointer; }
.btn-home { padding: 14px; border: 2px solid #e0d8cc; border-radius: 14px; background: transparent; font-family: 'Kaisei Decol', serif; font-size: 17px; cursor: pointer; color: var(--sub); }

/* 苦手ジャンル */
.weak-item { background: var(--bg); border-radius: 12px; padding: 10px 14px; cursor: pointer; border: 1.5px solid #e0d8cc; margin-bottom: 8px; transition: all 0.2s; }
.weak-item:hover { border-color: var(--accent1); }
.weak-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }

/* 数字パッド（モバイル補助） */
.numpad { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin: 10px 0 0; }
.numpad-btn { padding: 10px 4px; border: 2px solid #e0d8cc; border-radius: 10px; background: #fff; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Kaisei Decol', serif; color: var(--text); transition: all 0.15s; }
.numpad-btn:hover { background: var(--accent1); border-color: var(--accent1); color: #fff; }
.numpad-btn.del { font-size: 14px; background: #f8f5ef; }
.numpad-btn.neg { font-size: 14px; }

.hidden { display: none; }

  /* ホームボタン */
  .home-btn {
    position: fixed; top: 12px; left: 12px; z-index: 999;
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 20px; border: none;
    font-family: inherit; font-size: 12px; font-weight: 700;
    cursor: pointer; text-decoration: none;
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.8);
    backdrop-filter: blur(8px);
    transition: all 0.2s;
  }
  .home-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }
</style>
</head>
<body>

<a class="home-btn" href="index.html">🏠 ホーム</a>



<!-- ホーム画面 -->
<div class="wrap" id="homeScreen">
  <div class="header">
    <span class="header-icon">🧮</span>
    <h1>算数クイズ</h1>
    <p>中学受験対策 ｜ 小5・小6</p>
  </div>

  <div class="card">
    <p style="font-size:13px;color:var(--sub);margin-bottom:10px;font-weight:700">📊 レベルを選ぼう</p>
    <div class="level-grid">
      <button class="lv-btn active" data-lv="1" onclick="selectLevel(1)">
        <span class="lv-name">⭐ レベル１</span>
        <span class="lv-desc">基礎固め（確実に解ける）</span>
      </button>
      <button class="lv-btn" data-lv="2" onclick="selectLevel(2)">
        <span class="lv-name">⭐⭐ レベル２</span>
        <span class="lv-desc">標準（よく出る典型題）</span>
      </button>
      <button class="lv-btn" data-lv="3" onclick="selectLevel(3)">
        <span class="lv-name">⭐⭐⭐ レベル３</span>
        <span class="lv-desc">応用（入試頻出）</span>
      </button>
      <button class="lv-btn" data-lv="4" onclick="selectLevel(4)">
        <span class="lv-name">🔥 レベル４</span>
        <span class="lv-desc">難関校（灘・開成レベル）</span>
      </button>
    </div>
  </div>

  <div class="card">
    <p style="font-size:13px;color:var(--sub);margin-bottom:8px;font-weight:700">🏷️ 単元を選ぼう</p>
    <div class="cat-wrap" id="catButtons"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
      <span style="font-size:12px;color:var(--sub)">出題数：<strong id="qCount" style="color:var(--accent1)"></strong> 問</span>
      <button class="hint-btn" onclick="startWeakMode()" id="weakModeBtn" style="display:none">🔥 苦手優先</button>
    </div>
  </div>

  <div id="weakSection" class="card hidden">
    <p style="font-size:13px;color:var(--sub);margin-bottom:10px;font-weight:700">🔥 苦手ジャンル</p>
    <div id="weakList"></div>
  </div>

  <button class="start-btn" onclick="startQuiz()">はじめる ▶</button>
</div>

<!-- クイズ画面 -->
<div class="wrap hidden" id="quizScreen">
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="qIndex"></span>
      <span id="scoreDisp"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="card" id="quizCard">
    <div class="quiz-header">
      <div style="display:flex;flex-direction:column;gap:3px">
        <span class="quiz-cat-badge" id="qCatBadge"></span>
        <span style="font-size:10px;color:var(--sub);letter-spacing:0.5px" id="qIdBadge"></span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="hint-btn" id="hintBtn" onclick="showHint()" style="font-size:11px;padding:4px 10px">💡 ヒント（−5pt）</button>
        <span class="quiz-lv-badge" id="qLvBadge"></span>
      </div>
    </div>
    <div class="quiz-emoji" id="qEmoji"></div>
    <div class="question-area">
      <div class="question-text" id="qText"></div>
    </div>
    <div id="hintArea"></div>
  </div>

  <div class="exp-box hidden" id="expBox">
    <div class="exp-result" id="expResult"></div>
    <div id="expAnswer" style="font-size:13px;margin-bottom:8px"></div>
    <div class="exp-title">📝 解き方</div>
    <div class="exp-steps" id="expSteps"></div>
    <a id="expLink" href="#" target="_blank" rel="noopener" class="wiki-link hidden">🔗 参考リンク</a>
  </div>

  <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()"></button>
</div>

<!-- 固定入力バー（クイズ中のみ表示） -->
<div class="input-bar hidden" id="inputBar">
  <input class="num-input-bar" type="number" id="answerInput" placeholder="こたえを入力" inputmode="decimal" autocomplete="off">
  <button class="submit-bar-btn" id="submitBtn" onclick="submitAnswer()">こたえる ✓</button>
  <div class="numpad-bar">
    <button onclick="padInput('7')">7</button>
    <button onclick="padInput('8')">8</button>
    <button onclick="padInput('9')">9</button>
    <button class="del-btn" onclick="padDel()">⌫</button>
    <button onclick="padNeg()">±</button>
    <button onclick="padInput('4')">4</button>
    <button onclick="padInput('5')">5</button>
    <button onclick="padInput('6')">6</button>
    <button onclick="padInput('.')">.</button>
    <button onclick="padInput('0')">0</button>
    <button onclick="padInput('1')">1</button>
    <button onclick="padInput('2')">2</button>
    <button onclick="padInput('3')">3</button>
    <button style="grid-column:span 2;font-size:13px" onclick="padInput('00')">00</button>
  </div>
</div>

<!-- 結果画面 -->
<div class="wrap hidden" id="resultScreen">
  <div class="result-hero">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-sub" id="resultSub"></div>
    <div class="perfect-banner hidden" id="perfectBanner">🏆 全問正解！すごい！！</div>
  </div>

  <div class="card">
    <p style="font-size:13px;color:var(--sub);margin-bottom:12px;font-weight:700">📊 結果</p>
    <div class="stat-grid">
      <div class="stat-item">
        <div class="stat-num" id="statCorrect" style="color:#16a34a"></div>
        <div class="stat-lbl">正解</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="statStreak" style="color:var(--accent1)"></div>
        <div class="stat-lbl">最大連続正解</div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:14px">
    <p style="font-size:13px;color:var(--sub);margin-bottom:10px;font-weight:700">📈 単元別正答率</p>
    <div id="catStats"></div>
  </div>

  <div class="card" style="margin-top:14px">
    <p style="font-size:13px;color:var(--sub);margin-bottom:10px;font-weight:700">📋 解答ログ</p>
    <div id="answerLog"></div>
  </div>

  <div class="result-btns">
    <button class="btn-retry hidden" id="retryWrongBtn" onclick="retryWrong()"></button>
    <button class="btn-home" onclick="showHome()">🏠 トップに戻る</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  問題データ
//  answer: 数値（小数は小数、分数は小数換算 or 文字列で"3/4"等）
//  answerDisplay: 解答欄に表示する値
//  template: 問題文。□ が入力欄になる
//  steps: 解き方の手順（配列）
// ══════════════════════════════════════════

// ══════════════════════════════════════════
//  カテゴリ・状態管理
// ══════════════════════════════════════════
const CATS = ["すべて","整数・計算","約数・倍数","分数・小数","割合・比","速さ","面積・図形","規則性・数列","場合の数・確率","立体図形"];
const LV_COLORS = ["","#4ecdc4","#ff9f43","#ff6b35","#e84393"];
const LV_NAMES = ["","⭐ レベル１","⭐⭐ レベル２","⭐⭐⭐ レベル３","🔥 レベル４"];

const catStatsGlobal = {};
function recordAnswer(cat, ok) {
  if (!catStatsGlobal[cat]) catStatsGlobal[cat] = { ok:0, total:0 };
  catStatsGlobal[cat].total++;
  if (ok) catStatsGlobal[cat].ok++;
}
function getCatRank() {
  return Object.entries(catStatsGlobal)
    .filter(([,s]) => s.total >= 2)
    .sort(([,a],[,b]) => (a.ok/a.total) - (b.ok/b.total))
    .map(([cat,s]) => ({ cat, rate: Math.round(s.ok/s.total*100), total: s.total }));
}

let state = {
  lv: 1, cat: "すべて",
  questions: [], current: 0,
  score: 0, streak: 0, maxStreak: 0,
  hintUsed: false, answered: false,
  answers: [], wrongQuestions: [],
  seenIds: new Set(),
};

// ══════════════════════════════════════════
//  ホーム画面
// ══════════════════════════════════════════
function selectLevel(lv) {
  state.lv = lv;
  document.querySelectorAll(".lv-btn").forEach(b => b.classList.remove("active"));
  document.querySelector(`.lv-btn[data-lv="${lv}"]`).classList.add("active");
  updateHomeCount();
}

function renderCatButtons() {
  const wrap = document.getElementById("catButtons");
  wrap.innerHTML = "";
  CATS.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (cat === state.cat ? " active" : "");
    btn.textContent = cat;
    btn.onclick = () => { state.cat = cat; renderCatButtons(); updateHomeCount(); };
    wrap.appendChild(btn);
  });
}

function updateHomeCount() {
  const pool = getPool();
  const n = Math.min(pool.length, 10);
  document.getElementById("qCount").textContent = pool.length <= 10 ? pool.length : `10（全${pool.length}問中）`;
  const ranks = getCatRank();
  document.getElementById("weakModeBtn").style.display = ranks.length > 0 ? "" : "none";
  renderWeakSection();
}

function renderWeakSection() {
  const ranks = getCatRank();
  const sec = document.getElementById("weakSection");
  if (ranks.length === 0) { sec.classList.add("hidden"); return; }
  sec.classList.remove("hidden");
  document.getElementById("weakList").innerHTML = ranks.slice(0,4).map(({cat, rate, total}) => {
    const emoji = rate <= 40 ? "😣" : rate <= 60 ? "😅" : "😊";
    return `<div class="weak-item" onclick="startWeakCat('${cat}')">
      <div class="weak-row"><span>${emoji} ${cat}</span><span style="color:${rate<=40?"#ef4444":rate<=60?"#f97316":"#16a34a"}">${rate}% (${total}問)</span></div>
      <div style="height:6px;background:#ede8df;border-radius:3px"><div style="height:6px;background:var(--accent1);border-radius:3px;width:${rate}%"></div></div>
    </div>`;
  }).join("");
}

function getPool() {
  return QUESTIONS.filter(q =>
    (state.lv === 0 || q.lv === state.lv) &&
    (state.cat === "すべて" || q.cat === state.cat)
  );
}

// □/□ を縦分数で、□ を入力欄スタイルで描画
function renderTemplate(tmpl) {
  // □/□ を縦分数の blank に変換（分数の穴埋め）
  let html = tmpl
    .replace(/□\/□/g, '<span class="frac blank-box" style="border:2px dashed var(--accent1);border-radius:8px;padding:4px 6px;background:#fff;min-width:48px"><span class="fn" style="color:var(--accent1)">？</span><span class="fd" style="color:var(--accent1)">？</span></span>')
    .replace(/□/g, '<span class="blank-box">？</span>')
    .replace(/\n/g, '<br>');
  return html;
}

// 答え表示：□/□ に合わせた分数表示
function renderAnswerInBlanks(q) {
  const display = q.answerDisplay;
  const blanks = document.querySelectorAll(".blank-box");
  if (!blanks.length) return;
  // 分数表示かどうか
  if (display.includes('/') && blanks.length === 1) {
    const [num, den] = display.split('/');
    blanks[0].innerHTML = '<span class="fn">' + num + '</span><span class="fd">' + den + '</span>';
    blanks[0].style.border = '2px solid';
  } else {
    blanks.forEach(el => { el.textContent = display; });
  }
}

function weightedShuffle(pool) {
  const weighted = [];
  pool.forEach(q => {
    const w = state.seenIds.has(q.id) ? 1 : 3;
    for (let i=0; i<w; i++) weighted.push(q);
  });
  weighted.sort(() => Math.random() - 0.5);
  const seen = new Set(); const result = [];
  for (const q of weighted) {
    if (!seen.has(q.id)) { seen.add(q.id); result.push(q); }
    if (result.length >= 10) break;
  }
  return result;
}

function showHome() {
  document.getElementById("homeScreen").classList.remove("hidden");
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("inputBar").classList.add("hidden");
  renderCatButtons();
  updateHomeCount();
}

// ══════════════════════════════════════════
//  クイズ開始
// ══════════════════════════════════════════
function startQuiz(pool) {
  const base = pool || weightedShuffle(getPool());
  if (base.length === 0) { alert("この条件では問題がありません。レベルや単元を変えてみてください。"); return; }
  state.questions = base;
  state.questions.forEach(q => state.seenIds.add(q.id));
  state.current = 0; state.score = 0; state.streak = 0; state.maxStreak = 0;
  state.answered = false; state.answers = []; state.wrongQuestions = [];
  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  document.getElementById("inputBar").classList.add("hidden");
  renderQuiz();
}

function retryWrong() { startQuiz(state.wrongQuestions); }

function startWeakMode() {
  const ranks = getCatRank();
  if (!ranks.length) return;
  const weakCats = new Set(ranks.map(r => r.cat));
  const pool = [];
  const weighted = [];
  QUESTIONS.filter(q => q.lv === state.lv || state.lv === 0).forEach(q => {
    const w = weakCats.has(q.cat) ? 3 : 1;
    for (let i=0; i<w; i++) weighted.push(q);
  });
  weighted.sort(() => Math.random() - 0.5);
  const seen = new Set();
  for (const q of weighted) {
    if (!seen.has(q.id)) { seen.add(q.id); pool.push(q); }
    if (pool.length >= 10) break;
  }
  startQuiz(pool);
}

function startWeakCat(cat) {
  state.cat = cat;
  const pool = QUESTIONS.filter(q => q.cat === cat);
  startQuiz(weightedShuffle(pool));
}

// ══════════════════════════════════════════
//  クイズ描画
// ══════════════════════════════════════════
function renderQuiz() {
  const { questions, current, score, streak } = state;
  const q = questions[current];
  const lv = q.lv;
  const lvColor = LV_COLORS[lv];

  document.getElementById("qIndex").textContent = `${current+1} / ${questions.length}`;
  const sd = document.getElementById("scoreDisp");
  sd.textContent = `${score} pt`; sd.style.color = lvColor;
  const sb = document.getElementById("streakBadge") || { style:{}, textContent:'' };

  const fill = document.getElementById("progressFill");
  fill.style.width = `${((current+1)/questions.length)*100}%`;

  const catBadge = document.getElementById("qCatBadge");
  catBadge.textContent = q.cat;
  catBadge.style.background = lvColor;

  document.getElementById("qIdBadge").textContent = `QUIZ ID: ${String(q.id).padStart(5, '0')}`;

  const lvBadge = document.getElementById("qLvBadge");
  lvBadge.textContent = LV_NAMES[lv];
  lvBadge.style.background = lvColor + "22";
  lvBadge.style.color = lvColor;

  document.getElementById("qEmoji").textContent = q.emoji;
  document.getElementById("qEmoji").style.fontSize = "28px";
  document.getElementById("qEmoji").style.margin = "4px 0 4px";

  // 問題文レンダリング（□/□は縦分数、□は穴埋めボックス）
  document.getElementById("qText").innerHTML = renderTemplate(q.template);

  const input = document.getElementById("answerInput");
  input.value = ""; input.className = "num-input-bar"; input.disabled = false;
  document.getElementById("submitBtn").disabled = false;
  document.getElementById("hintBtn").style.display = "";
  document.getElementById("hintArea").innerHTML = "";
  document.getElementById("expBox").classList.add("hidden");
  const nextBtn = document.getElementById("nextBtn");
  nextBtn.classList.add("hidden");
  nextBtn.style.background = `linear-gradient(135deg, ${lvColor}, #26a0da)`;
  document.getElementById("inputBar").classList.remove("hidden");

  state.hintUsed = false; state.answered = false;
  setTimeout(() => input.focus(), 100);
}

// ══════════════════════════════════════════
//  数字パッド
// ══════════════════════════════════════════
function padInput(ch) {
  const inp = document.getElementById("answerInput");
  if (inp.disabled) return;
  if (ch === '.' && inp.value.includes('.')) return;
  inp.value += ch;
  inp.focus();
}
function padDel() {
  const inp = document.getElementById("answerInput");
  if (!inp.disabled) inp.value = inp.value.slice(0,-1);
}
function padNeg() {
  const inp = document.getElementById("answerInput");
  if (inp.disabled) return;
  inp.value = inp.value.startsWith('-') ? inp.value.slice(1) : '-' + inp.value;
}

// ══════════════════════════════════════════
//  解答処理
// ══════════════════════════════════════════
function submitAnswer() {
  if (state.answered) return;
  const input = document.getElementById("answerInput");
  const raw = input.value.trim();
  if (raw === "") { input.focus(); return; }

  const q = state.questions[state.current];
  const userVal = parseFloat(raw);
  // 許容誤差 0.01（小数問題対応）
  const isCorrect = Math.abs(userVal - q.answer) < 0.01;

  state.answered = true;
  state.answers.push({ correct: isCorrect, userVal: raw, q });
  if (!isCorrect) state.wrongQuestions.push(q);
  recordAnswer(q.cat, isCorrect);

  const pts = isCorrect ? (state.hintUsed ? 5 : 10) : 0;
  state.score += pts;
  state.streak = isCorrect ? state.streak + 1 : 0;
  state.maxStreak = Math.max(state.maxStreak, state.streak);

  // スコア更新
  document.getElementById("scoreDisp").textContent = `${state.score} pt`;

  // 入力欄の色
  input.className = "num-input-bar " + (isCorrect ? "correct" : "wrong");
  input.disabled = true;
  document.getElementById("submitBtn").disabled = true;
  document.getElementById("inputBar").classList.add("hidden");

  // □の答えを表示（分数は縦分数で）
  renderAnswerInBlanks(q);
  document.querySelectorAll(".blank-box").forEach(el => {
    el.classList.add(isCorrect ? "correct-ans" : "wrong-ans");
  });

  // 解説
  const expBox = document.getElementById("expBox");
  expBox.className = "exp-box " + (isCorrect ? "correct-box" : "wrong-box");
  expBox.classList.remove("hidden");

  const expResult = document.getElementById("expResult");
  expResult.className = "exp-result " + (isCorrect ? "ok" : "ng");
  expResult.textContent = isCorrect ? `⭕ 正解！ +${pts}pt` : `❌ 不正解　正解：${q.answerDisplay}`;

  document.getElementById("expAnswer").textContent = isCorrect ? "" : `あなたの答え：${raw}`;

  // 解き方ステップ
  document.getElementById("expSteps").innerHTML = q.steps.map((s, i) =>
    `<div class="step"><span class="step-num">${i+1}</span><span>${s}</span></div>`
  ).join("");

  // リンク
  const expLink = document.getElementById("expLink");
  if (q.link) {
    expLink.href = q.link; expLink.classList.remove("hidden");
  } else {
    expLink.classList.add("hidden");
  }

  // 次へボタン
  const nextBtn = document.getElementById("nextBtn");
  nextBtn.classList.remove("hidden");
  nextBtn.textContent = state.current + 1 >= state.questions.length ? "けっかをみる 🏁" : "つぎの問題 →";

  // Enterキーで次へ
  document.getElementById("answerInput").onkeydown = null;
}

// Enterで送信
document.getElementById("answerInput").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    if (!state.answered) submitAnswer();
    else nextQuestion();
  }
});

function showHint() {
  const q = state.questions[state.current];
  state.hintUsed = true;
  document.getElementById("hintBtn").style.display = "none";
  document.getElementById("hintArea").innerHTML =
    `<div class="hint-box">💡 ${q.hint}</div>`;
}

function nextQuestion() {
  if (state.current + 1 >= state.questions.length) showResult();
  else {
    state.current++;
    state.answered = false;
    state.hintUsed = false;
    document.getElementById("inputBar").classList.add("hidden");
    window.scrollTo({ top: 0, behavior: 'instant' });
    renderQuiz();
  }
}

// ══════════════════════════════════════════
//  結果画面
// ══════════════════════════════════════════
function showResult() {
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("inputBar").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");

  const { questions, answers, score, maxStreak, wrongQuestions } = state;
  const correct = answers.filter(a => a.correct).length;

  document.getElementById("resultIcon").textContent =
    correct === questions.length ? "🏆" : correct >= questions.length*0.7 ? "🥈" : "🎯";
  document.getElementById("resultScore").textContent = `${score} pt`;
  document.getElementById("resultSub").textContent = `${correct} / ${questions.length} 問正解`;
  document.getElementById("statCorrect").textContent = `${correct}/${questions.length}`;
  document.getElementById("statStreak").textContent = `${maxStreak}🔥`;

  if (correct === questions.length) document.getElementById("perfectBanner").classList.remove("hidden");
  else document.getElementById("perfectBanner").classList.add("hidden");

  // カテゴリ別
  const cs = {};
  questions.forEach((q,i) => {
    if (!cs[q.cat]) cs[q.cat] = {ok:0, total:0};
    cs[q.cat].total++;
    if (answers[i]?.correct) cs[q.cat].ok++;
  });
  document.getElementById("catStats").innerHTML = Object.entries(cs).map(([cat, {ok, total}]) => `
    <div class="cat-bar-wrap">
      <div class="cat-bar-row"><span>${cat}</span><span style="color:var(--accent1)">${ok}/${total}</span></div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(ok/total)*100}%"></div></div>
    </div>`).join("");

  // ログ
  document.getElementById("answerLog").innerHTML = questions.map((q,i) => {
    const a = answers[i];
    const qId = String(q.id).padStart(5, '0');
    return `<div class="log-row">
      <span style="flex-shrink:0">${a?.correct ? "⭕" : "❌"}</span>
      <div class="log-q"><span style="font-size:10px;color:var(--sub);margin-right:4px">${qId}</span>${q.template.replace(/\n.*/,'').replace(/□/g,`[${q.answerDisplay}]`)}</div>
      <span class="log-ans">${a?.correct ? "" : `→ ${q.answerDisplay}`}</span>
    </div>`;
  }).join("");

  const retryBtn = document.getElementById("retryWrongBtn");
  if (wrongQuestions.length > 0) {
    retryBtn.classList.remove("hidden");
    retryBtn.textContent = `❌ 間違えた ${wrongQuestions.length} 問をもう一度`;
  } else retryBtn.classList.add("hidden");
}

// ══════════════════════════════════════════
//  初期化
// ══════════════════════════════════════════
renderCatButtons();
updateHomeCount();
</script>
<script src="usage-log.js"></script>
