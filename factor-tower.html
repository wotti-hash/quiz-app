<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数学の塔 — 因数分解版</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0f1e; --card: #131a2e; --border: rgba(129,140,248,0.18);
  --text: #eef1fb; --sub: #8b93b8; --accent: #818cf8; --accent2: #f0a35a;
  --gold: #ffd700; --red: #ff6b6b; --green: #44dd99; --blue: #60a5fa; --yellow: #ffd95a;
}
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
.bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse at 18% 12%, rgba(129,140,248,0.14) 0%, transparent 55%), radial-gradient(ellipse at 85% 82%, rgba(240,163,90,0.10) 0%, transparent 55%); }
.hidden { display: none !important; }
.screen { display: none; position: relative; z-index: 1; min-height: 100vh; flex-direction: column; align-items: center; padding: 0 0 60px; }
.screen.active { display: flex; }
.wrap { width: 100%; max-width: 480px; padding: 0 20px; }
.btn { display: block; width: 100%; padding: 14px; border-radius: 14px; border: none; cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 700; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, #818cf8, #5b63d6); color: #fff; box-shadow: 0 4px 16px rgba(129,140,248,0.3); }
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(129,140,248,0.45); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: rgba(129,140,248,0.1); color: var(--accent); border: 1px solid rgba(129,140,248,0.3); }
.btn-secondary:hover { background: rgba(129,140,248,0.18); }
.btn-ghost { background: rgba(255,255,255,0.05); color: var(--sub); border: 1px solid rgba(255,255,255,0.1); }
.btn-ghost:hover { background: rgba(255,255,255,0.1); }
.btn-warm { background: linear-gradient(135deg, #f0a35a, #e0822a); color: #2a1500; }
.page-header { width: 100%; max-width: 480px; display: flex; align-items: center; gap: 12px; padding: 16px 20px 4px; }
.page-header h2 { font-size: 16px; font-weight: 700; }

#titleScreen { justify-content: center; background: radial-gradient(ellipse at 50% 0%, rgba(129,140,248,0.14) 0%, transparent 65%), var(--bg); }
.title-wrap { text-align: center; padding: 24px 20px; max-width: 400px; width: 100%; }
.title-icon { font-size: 70px; display: block; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.title-main { font-family: 'Kaisei Decol', serif; font-size: 32px; font-weight: 700; margin: 14px 0 2px; background: linear-gradient(135deg, #818cf8, #f0a35a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.title-sub { color: var(--sub); font-size: 13px; margin-bottom: 26px; }
.title-btns { display: flex; flex-direction: column; gap: 10px; }
.name-row { display: flex; gap: 8px; margin-bottom: 18px; }
.name-input { flex: 1; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 15px; font-family: inherit; outline: none; }
.name-input:focus { border-color: var(--accent); }

.map-wrap { width: 100%; max-width: 480px; padding: 0 16px; }
.map-floors { display: flex; flex-direction: column; gap: 12px; margin: 12px 0 16px; }
.floor-card { border-radius: 16px; padding: 16px; border: 1px solid var(--border); background: var(--card); cursor: pointer; transition: all 0.2s; user-select: none; }
.floor-card:hover:not(.locked) { transform: translateY(-2px); border-color: rgba(129,140,248,0.45); }
.floor-card.locked { opacity: 0.4; cursor: default; filter: grayscale(0.5); }
.floor-card.cleared { border-color: rgba(68,221,153,0.35); background: rgba(68,221,153,0.05); }
.fc-top { display: flex; align-items: center; gap: 12px; }
.fc-emoji { font-size: 28px; }
.fc-info { flex: 1; }
.fc-name { font-size: 15px; font-weight: 700; }
.fc-theme { font-size: 11px; color: var(--sub); margin-top: 2px; }
.fc-badge { font-size: 20px; }
.fc-prog { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
.fc-pip { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); }
.fc-pip.done { background: var(--accent); }
.fc-pip.now { background: var(--accent2); }

.play-wrap { width: 100%; max-width: 480px; padding: 0 16px; }
.play-bar { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; font-size: 12px; }
.pb-floor { font-weight: 700; color: var(--accent); }
.pb-lv { color: var(--sub); }
.pb-prog { display: flex; gap: 4px; }
.pb-pip { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.12); }
.pb-pip.on { background: var(--accent); }

.q-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px 16px; text-align: center; margin-bottom: 14px; }
.q-label { font-size: 12px; color: var(--sub); margin-bottom: 12px; }
.q-poly { font-size: 30px; font-weight: 800; letter-spacing: 1px; }
sup { font-size: 0.6em; vertical-align: super; }

.ans-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px 16px; margin-bottom: 12px; }
.ans-label { font-size: 13px; color: var(--sub); text-align: center; margin-bottom: 14px; font-weight: 700; }
.tmpl { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 2px; font-size: 24px; font-weight: 700; }
.tmpl .blank { width: 46px; height: 46px; text-align: center; font-size: 22px; font-weight: 800; border-radius: 10px; border: 2px solid var(--accent); background: rgba(129,140,248,0.08); color: var(--text); font-family: inherit; outline: none; margin: 0 2px; }
.tmpl .blank:focus { border-color: var(--accent2); background: rgba(240,163,90,0.1); }
.tmpl .paren { color: var(--sub); font-weight: 700; }
.ans-hint { font-size: 11px; color: var(--sub); text-align: center; margin-top: 12px; line-height: 1.6; }

.cross-box { display: flex; justify-content: center; margin: 10px 0; }
.cross { display: grid; grid-template-columns: auto auto; gap: 4px 24px; font-size: 22px; font-weight: 700; align-items: center; position: relative; padding: 6px 10px; }
.cross .cx { color: var(--accent2); }

.action-row { display: flex; flex-direction: column; gap: 10px; }
.guide-head { font-size: 12px; color: var(--accent2); font-weight: 700; text-align: center; margin-bottom: 8px; }
.guide-prompt { font-size: 15px; line-height: 1.7; margin-bottom: 14px; }
.guide-prompt b { color: var(--accent2); }
.gblanks { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; font-size: 24px; font-weight: 700; }
.gblank { width: 52px; height: 50px; text-align: center; font-size: 22px; font-weight: 800; border-radius: 10px; border: 2px solid var(--accent); background: rgba(129,140,248,0.08); color: var(--text); font-family: inherit; outline: none; }
.gblank:focus { border-color: var(--accent2); }

.fb { border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.fb-correct { background: rgba(68,221,153,0.1); border: 1px solid rgba(68,221,153,0.4); }
.fb-near { background: rgba(255,217,90,0.1); border: 1px solid rgba(255,217,90,0.45); }
.fb-wrong { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.35); }
.fb-title { font-size: 18px; font-weight: 900; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.fb-correct .fb-title { color: var(--green); } .fb-near .fb-title { color: var(--yellow); } .fb-wrong .fb-title { color: var(--red); }
.fb-advice { font-size: 14px; line-height: 1.7; } .fb-advice b { color: var(--accent2); }

.steps-box { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
.steps-title { font-size: 12px; color: var(--sub); font-weight: 700; margin-bottom: 8px; }
.step { display: flex; gap: 10px; align-items: flex-start; padding: 6px 0; font-size: 14px; line-height: 1.5; }
.step-no { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: rgba(129,140,248,0.18); color: var(--accent); font-size: 12px; font-weight: 900; display: flex; align-items: center; justify-content: center; }

#clearScreen { justify-content: center; }
.clear-wrap { text-align: center; padding: 24px 20px; max-width: 380px; }
.clear-icon { font-size: 64px; display: block; animation: float 2.6s ease-in-out infinite; margin-bottom: 12px; }
.clear-title { font-family: 'Kaisei Decol', serif; font-size: 28px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
.clear-msg { font-size: 14px; color: var(--sub); line-height: 1.7; margin-bottom: 24px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: 12px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 300; overflow: hidden; }
.confetti-piece { position: absolute; top: -24px; width: 9px; height: 13px; opacity: 0.92; animation: confettiFall linear forwards; }
@keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); } }
.foot-note { font-size: 11px; color: var(--sub); text-align: center; margin-top: 16px; opacity: 0.7; line-height: 1.6; }
</style>
</head>
<body>
<div class="bg-layer"></div>

<div id="titleScreen" class="screen active">
  <div class="title-wrap">
    <span class="title-icon">🧩</span>
    <div class="title-main">数学の塔</div>
    <div class="title-sub">因数分解版 — たすき掛けまで1歩ずつ</div>
    <div class="name-row"><input class="name-input" id="nameInput" type="text" placeholder="なまえ（任意）" maxlength="10"></div>
    <div class="title-btns">
      <button class="btn btn-primary" onclick="startGame()">はじめる ▶</button>
      <a class="btn btn-ghost" href="index.html" style="text-decoration:none;text-align:center">← QUIZ HUB に戻る</a>
    </div>
    <div class="foot-note">共通因数 → (x+a)(x+b) → 平方 → 平方の差 → <b>たすき掛け</b> → 総合。<br>わからない問題は「1つずつ解く」で順番に進めるよ。</div>
  </div>
</div>

<div id="mapScreen" class="screen">
  <div class="page-header">
    <button class="btn-ghost btn" style="width:auto;padding:8px 12px;font-size:12px" onclick="showScreen('titleScreen')">← もどる</button>
    <h2>フロアをえらぶ</h2>
  </div>
  <div class="map-wrap" style="margin-top:8px">
    <div class="map-floors" id="mapFloors"></div>
    <button class="btn btn-ghost" onclick="resetProgress()" style="font-size:12px">進み具合をリセット</button>
  </div>
</div>

<div id="playScreen" class="screen">
  <div class="page-header">
    <button class="btn-ghost btn" style="width:auto;padding:8px 12px;font-size:12px" onclick="showScreen('mapScreen')">← マップ</button>
    <h2 id="playTitle">フロア</h2>
  </div>
  <div class="play-wrap" style="margin-top:8px">
    <div class="play-bar">
      <span class="pb-floor" id="pbFloor">1F</span>
      <span class="pb-lv" id="pbLv">レベル1</span>
      <span class="pb-prog" id="pbProg"></span>
    </div>
    <div class="q-card">
      <div class="q-label">因数分解しよう</div>
      <div class="q-poly" id="qPoly"></div>
    </div>
    <div class="ans-card" id="answerArea"></div>
    <div id="feedbackArea"></div>
    <div class="action-row" id="actionRow"></div>
  </div>
</div>

<div id="clearScreen" class="screen">
  <div class="clear-wrap">
    <span class="clear-icon" id="clearIcon">🎉</span>
    <div class="clear-title" id="clearTitle">レベルクリア！</div>
    <div class="clear-msg" id="clearMsg"></div>
    <div class="title-btns">
      <button class="btn btn-primary" id="clearNextBtn" onclick="afterClear()">つづける ▶</button>
      <button class="btn btn-ghost" onclick="showScreen('mapScreen')">マップに戻る</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ══ AIアドバイス（任意・既定OFF）: ルールで判定できない間違いだけWorker経由でClaudeに相談。空ならルールのみ ══
const AI_ADVICE_URL = "";

const SAVE_KEY = 'factorTower_v1';
const LEVELS_PER_FLOOR = 3;
const NEED_PER_LEVEL = 4;
const SCREENS = ['titleScreen','mapScreen','playScreen','clearScreen'];

const FLOORS = [
  { key:'common', emoji:'🔱', name:'共通因数の間', theme:'共通なものでくくる（6x²+9x）' },
  { key:'sumprod', emoji:'➕', name:'和と積の間',   theme:'(x+a)(x+b)' },
  { key:'square',  emoji:'⏹️', name:'平方の間',     theme:'(x±a)²' },
  { key:'diff',    emoji:'🔻', name:'平方の差の間', theme:'x²−a² = (x+a)(x−a)' },
  { key:'cross',   emoji:'❌', name:'たすき掛けの間', theme:'ax²+bx+c （a≠1）' },
  { key:'mix',     emoji:'👑', name:'総合の間',     theme:'ぜんぶミックス' },
];

// ══ セーブ ══
let playerName = '', save = {};
function defaultSave() { const p = {}; FLOORS.forEach(f => p[f.key] = { level: 1, cleared: false }); return { name: '', progress: p }; }
function loadSave() { try { save = JSON.parse(localStorage.getItem(SAVE_KEY)); } catch { save = null; } if (!save || !save.progress) save = defaultSave(); FLOORS.forEach(f => { if (!save.progress[f.key]) save.progress[f.key] = { level: 1, cleared: false }; }); }
function writeSave() { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }

// ══ ユーティリティ ══
function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a || 1; }
function randInt(lo, hi) { return Math.floor(Math.random() * (hi - lo + 1)) + lo; }
function pickSign() { return Math.random() < 0.5 ? 1 : -1; }
function nz(lo, hi) { let v = 0; while (v === 0) v = randInt(lo, hi); return v; }

// 多項式の係数 {a,b,c} を ax²+bx+c の文字列に
function formatPoly(a, b, c) {
  let s = '';
  s += (a === 1 ? 'x²' : a === -1 ? '−x²' : `${a}x²`);
  if (b !== 0) s += (b > 0 ? ' + ' : ' − ') + (Math.abs(b) === 1 ? 'x' : `${Math.abs(b)}x`);
  if (c !== 0) s += (c > 0 ? ' + ' : ' − ') + `${Math.abs(c)}`;
  return s.replace('²', '<sup>2</sup>');
}
function blanksCount(type) { return { common: 3, sumprod: 2, square: 1, diff: 2, cross: 4 }[type]; }
function expandBlanks(type, v) {
  if (type === 'common') return { a: v[0] * v[1], b: v[0] * v[2], c: 0 };
  if (type === 'sumprod') return { a: 1, b: v[0] + v[1], c: v[0] * v[1] };
  if (type === 'square') return { a: 1, b: 2 * v[0], c: v[0] * v[0] };
  if (type === 'diff') return { a: 1, b: v[0] - v[1], c: -(v[0] * v[1]) };
  return { a: v[0] * v[2], b: v[0] * v[3] + v[1] * v[2], c: v[1] * v[3] }; // cross
}

// ══ 問題生成 ══
function buildQuestion(floorKey, level) {
  let key = floorKey;
  if (floorKey === 'mix') key = ['common','sumprod','square','diff','cross'][randInt(0, 4)];
  for (let t = 0; t < 400; t++) {
    let q = genByKey(key, level);
    if (q) return q;
  }
  return genByKey('sumprod', 1);
}
function genByKey(key, level) {
  if (key === 'common') {
    const g = level === 1 ? randInt(2, 4) : level === 2 ? randInt(2, 6) : randInt(3, 8);
    const p = randInt(1, level === 1 ? 3 : 4);
    let q = level === 3 ? nz(-6, 6) : randInt(1, 6);
    if (gcd(p, q) !== 1) return null;
    if (p === 1 && Math.abs(q) === 1) return null;
    const poly = { a: g * p, b: g * q, c: 0 };
    return mk('common', poly, { g, p, q }, level);
  }
  if (key === 'sumprod') {
    let a, b;
    if (level === 1) { a = randInt(1, 6); b = randInt(1, 6); }
    else if (level === 2) { a = nz(-7, 7); b = randInt(1, 7); }
    else { a = nz(-9, 9); b = nz(-9, 9); }
    if (a === b) return null;
    const poly = { a: 1, b: a + b, c: a * b };
    return mk('sumprod', poly, { a, b }, level);
  }
  if (key === 'square') {
    let k = level === 1 ? randInt(2, 6) : level === 2 ? randInt(2, 8) : randInt(3, 11);
    const s = level === 1 ? k : k * pickSign();
    const poly = { a: 1, b: 2 * s, c: s * s };
    return mk('square', poly, { s }, level);
  }
  if (key === 'diff') {
    const a = level === 1 ? randInt(2, 7) : level === 2 ? randInt(3, 10) : randInt(5, 13);
    const poly = { a: 1, b: 0, c: -(a * a) };
    return mk('diff', poly, { a }, level);
  }
  // cross: ax²+bx+c, a≠1
  let p, q, r, s;
  if (level === 1) { p = 1; r = randInt(2, 3); q = randInt(1, 3); s = randInt(1, 3); }
  else if (level === 2) { p = randInt(1, 3); r = randInt(2, 3); q = nz(-4, 4); s = nz(-4, 4); }
  else { p = randInt(1, 3); r = randInt(2, 4); q = nz(-5, 5); s = nz(-5, 5); }
  if (p < 1 || r < 1) return null;
  const a = p * r;
  if (a < 2) return null;                          // a=1 は和と積フロア
  if (gcd(p, q) !== 1 || gcd(r, s) !== 1) return null;   // 各かっこは既約に
  if (q * s === 0) return null;
  // 比例（同じ因数）を避ける
  if (p * s === q * r && p * s === 0) return null;
  const poly = { a, b: p * s + q * r, c: q * s };
  return mk('cross', poly, { p, q, r, s }, level);
}
function mk(type, poly, fac, level) {
  return { type, poly, fac, level, polyHTML: formatPoly(poly.a, poly.b, poly.c),
    steps: buildSteps(type, poly, fac), guided: buildGuided(type, poly, fac), hint: buildHint(type, fac) };
}

// ══ 解説ステップ ══
function buildSteps(type, poly, f) {
  if (type === 'common') {
    const g = f.g;
    return [
      `2つの項 <b>${poly.a}x²</b> と <b>${poly.b}x</b> に共通なものを探す。数の最大公約数は <b>${g}</b>、文字は <b>x</b> が共通。`,
      `共通因数 <b>${g}x</b> でくくると、中は ( ${f.p === 1 ? '' : f.p}x ${f.q >= 0 ? '+ ' + f.q : '− ' + (-f.q)} )。`,
      `答え： <b>${g}x(${f.p === 1 ? '' : f.p}x ${f.q >= 0 ? '+ ' + f.q : '− ' + (-f.q)})</b>`,
    ];
  }
  if (type === 'sumprod') {
    return [
      `かけて <b>${poly.c}</b>、たして <b>${poly.b}</b> になる2つの数をさがす。`,
      `その2数は <b>${f.a}</b> と <b>${f.b}</b>。（${f.a}×${f.b}=${poly.c}、${f.a}+${f.b}=${poly.b}）`,
      `答え： <b>(x ${signed(f.a)})(x ${signed(f.b)})</b>`,
    ];
  }
  if (type === 'square') {
    return [
      `平方の形 (x+□)²。2乗して <b>${poly.c}</b>、2倍して <b>${poly.b}</b> になる数は <b>${f.s}</b>。`,
      `答え： <b>(x ${signed(f.s)})²</b>`,
    ];
  }
  if (type === 'diff') {
    return [
      `<b>${-poly.c}</b> = ${f.a}² なので、これは x² − ${f.a}² の形（平方の差）。`,
      `公式 x² − a² = (x+a)(x−a) を使う。`,
      `答え： <b>(x + ${f.a})(x − ${f.a})</b>`,
    ];
  }
  return [
    `x²の係数 <b>${poly.a}</b> を分ける： ${f.p} × ${f.r}。定数 <b>${poly.c}</b> を分ける： ${f.q} × ${f.s}。`,
    `たすき掛け（ななめにかけてたす）： ${f.p}×${f.s} + ${f.q}×${f.r} = <b>${poly.b}</b>（＝xの係数）になればOK。`,
    `答え： <b>(${f.p}x ${signed(f.q)})(${f.r}x ${signed(f.s)})</b>`,
  ];
}
function signed(n) { return n >= 0 ? '+ ' + n : '− ' + (-n); }
function buildHint(type, f) {
  if (type === 'common') return '2つの項を両方わり切れる数と、共通の文字 x を見つけてくくり出そう。';
  if (type === 'sumprod') return 'かけて定数・たしてxの係数になる2数。積がマイナスなら符号ちがいの2数だよ。';
  if (type === 'square') return '同じものを2回かけた形かも。2乗して定数になる数を探そう（符号は真ん中に合わせる）。';
  if (type === 'diff') return '□² − △² の形。x² − a² = (x+a)(x−a)。';
  return '前の数どうしのかけ算で x²の係数、後ろどうしで定数。ななめのかけ算の和が xの係数。';
}

// ══ ガイド（1つずつ解く） ══
function buildGuided(type, poly, f) {
  if (type === 'common') {
    return [
      { prompt: `2つの項 <b>${poly.a}x²</b> と <b>${poly.b}x</b> の <b>数の</b>最大公約数は？`, n: 1,
        validate: v => v[0] === f.g, hint: '両方をわり切れる一番大きい数だよ。',
        advice: `${poly.a} と ${poly.b} を両方われる、一番大きい数をさがそう。`,
        explain: v => `共通の数は <b>${f.g}</b>。x も共通だから <b>${f.g}x</b> でくくれるね。` },
      { prompt: `では <b>${f.g}x(□x + □)</b> の形に完成させよう。`, answer: true },
    ];
  }
  if (type === 'sumprod') {
    return [
      { prompt: `かけて <b>${poly.c}</b>、たして <b>${poly.b}</b> になる2つの数は？`, n: 2,
        validate: v => v[0] * v[1] === poly.c && v[0] + v[1] === poly.b,
        hint: poly.c < 0 ? '積がマイナス → 符号がちがう2数。' : '積がプラス → 同じ符号の2数。',
        advice: `かけて ${poly.c}・たして ${poly.b} になる2数をさがそう。符号にも注意！`,
        explain: v => `その2数で (x+◯)(x+◯) になるよ。` },
      { prompt: `答えを完成させよう。`, answer: true },
    ];
  }
  if (type === 'square') {
    return [
      { prompt: `2乗して <b>${poly.c}</b>、2倍して <b>${poly.b}</b> になる数は？（符号も）`, n: 1,
        validate: v => v[0] * v[0] === poly.c && 2 * v[0] === poly.b,
        hint: '√' + poly.c + ' に、真ん中の符号をつけるよ。',
        advice: `2乗して ${poly.c}・2倍して ${poly.b} になる数（符号注意）。`,
        explain: v => `その数を使って (x+◯)² になるよ。` },
      { prompt: `答え (x+□)² を完成させよう。`, answer: true },
    ];
  }
  if (type === 'diff') {
    return [
      { prompt: `<b>${-poly.c}</b> は 何の2乗？ （2乗して ${-poly.c} になる正の数）`, n: 1,
        validate: v => v[0] > 0 && v[0] * v[0] === -poly.c,
        hint: '√' + (-poly.c) + ' を考えよう。',
        advice: `2乗して ${-poly.c} になる正の数だよ。`,
        explain: v => `a=${v[0]}。x² − a² = (x+a)(x−a) を使うよ。` },
      { prompt: `答え (x+□)(x−□) を完成させよう。`, answer: true },
    ];
  }
  // cross
  return [
    { prompt: `x²の係数 <b>${poly.a}</b> を、かけ算で2つに分けよう：　□ × □ = ${poly.a}`, n: 2,
      validate: v => v[0] > 0 && v[1] > 0 && v[0] * v[1] === poly.a,
      hint: `${poly.a} = 1×${poly.a}` + (poly.a % 2 === 0 ? ` や 2×${poly.a / 2}` : '') + ' など。',
      advice: `かけて ${poly.a} になる2つの数（各かっこの x の前の数）。`,
      explain: v => `前の数は ${v[0]} と ${v[1]}。` },
    { prompt: `定数 <b>${poly.c}</b> を、かけ算で2つに分けよう：　□ × □ = ${poly.c}`, n: 2,
      validate: v => v[0] * v[1] === poly.c,
      hint: poly.c < 0 ? '積がマイナス → 符号ちがいの2数。' : '同じ符号の2数。',
      advice: `かけて ${poly.c} になる2つの数（符号も合わせて）。`,
      explain: v => `後ろの数は ${v[0]} と ${v[1]}。` },
    { prompt: `たすき掛け！ ななめにかけてたした和が <b>${poly.b}</b> になるように置こう。<br>答え (□x+□)(□x+□) を完成させて。`, answer: true },
  ];
}

// ══ 判定 ══
function classify(q, v) {
  const ex = expandBlanks(q.type, v);
  const t = q.poly;
  const coeffOK = ex.a === t.a && ex.b === t.b && ex.c === t.c;
  if (coeffOK) {
    if (q.type === 'common' && v[0] !== q.fac.g) return { kind: 'near' };
    if (q.type === 'cross' && (gcd(v[0], v[1]) > 1 || gcd(v[2], v[3]) > 1)) return { kind: 'near' };
    return { kind: 'correct' };
  }
  return { kind: 'wrong', ex };
}
function diagnoseFactor(q, v, ex) {
  const t = q.poly;
  if (q.type === 'common') {
    if (ex.a === t.a && ex.b === t.b && ex.c === t.c) return `おしい！まだ全部はくくれてないよ。${t.a} と ${t.b} の最大公約数は <b>${q.fac.g}</b>。x もまとめて <b>${q.fac.g}x</b> でくくろう。`;
    if (ex.a !== t.a || ex.b !== t.b) return `くくり出した形をかけ算で戻すと元にならないよ。<b>前の数×中の数</b>が ${t.a}x²・${t.b}x になるか確かめよう。`;
    return '共通な数と x を見つけて、もう一度くくってみよう。';
  }
  if (ex.a !== t.a) return `<b>x²の係数</b>が ${t.a} にならないよ。${q.type === 'cross' ? '前の数どうしのかけ算（たすき掛けの「たて」）' : '先頭'}を見直そう。`;
  if (ex.c !== t.c) return `<b>定数</b>が ${t.c} にならないよ。${q.type === 'cross' ? '後ろの数どうしのかけ算' : '2数のかけ算'}と符号を見直そう。`;
  if (ex.b !== t.b) {
    if (ex.b === -t.b) return `<b>符号が逆</b>かも！ たして（ななめにかけてたして）${t.b} になる符号にしよう。`;
    if (q.type === 'cross') return `前と後ろは合ってる！ あとは <b>たすき掛け（ななめのかけ算の和）</b>が ${t.b} になるよう、数の置き場所を入れかえてみよう。`;
    if (q.type === 'square') return `真ん中の項（2×□）が ${t.b} にならないよ。2乗して ${t.c} になる数と符号を確認。`;
    return `かけて ${t.c} は合ってるけど、たして ${t.b} にならないよ。2数の組み合わせ・符号を見直そう。`;
  }
  return null;
}

// ══ ゲーム状態 ══
let gs = { floorKey: null, level: 1, correctInLevel: 0, q: null, answered: false, mode: 'direct', gidx: 0 };

function startGame() { playerName = document.getElementById('nameInput').value.trim(); save.name = playerName; writeSave(); if (playerName) try { localStorage.setItem('quizhub_name', playerName.slice(0, 16)); } catch (e) {} renderMap(); showScreen('mapScreen'); }
function showScreen(id) { SCREENS.forEach(s => document.getElementById(s).classList.remove('active')); document.getElementById(id).classList.add('active'); }
function isFloorUnlocked(i) { return i === 0 || save.progress[FLOORS[i - 1].key].cleared; }

function renderMap() {
  document.getElementById('mapFloors').innerHTML = FLOORS.map((f, i) => {
    const p = save.progress[f.key]; const unlocked = isFloorUnlocked(i);
    const state = !unlocked ? 'locked' : p.cleared ? 'cleared' : '';
    const badge = p.cleared ? '👑' : !unlocked ? '🔒' : '▶';
    const onclick = unlocked ? `onclick="enterFloor('${f.key}')"` : '';
    const pips = [1, 2, 3].map(lv => `<div class="fc-pip ${p.cleared || lv < p.level ? 'done' : (lv === p.level ? 'now' : '')}"></div>`).join('');
    return `<div class="floor-card ${state}" ${onclick}><div class="fc-top"><div class="fc-emoji">${f.emoji}</div><div class="fc-info"><div class="fc-name">${i + 1}F ${f.name}</div><div class="fc-theme">${f.theme}</div></div><div class="fc-badge">${badge}</div></div><div class="fc-prog">${pips}</div></div>`;
  }).join('');
}
function enterFloor(key) { gs.floorKey = key; gs.level = save.progress[key].cleared ? 1 : save.progress[key].level; gs.correctInLevel = 0; nextProblem(); showScreen('playScreen'); }

function nextProblem() {
  const f = FLOORS.find(x => x.key === gs.floorKey);
  gs.q = buildQuestion(gs.floorKey, gs.level);
  gs.answered = false; gs.mode = 'direct'; gs.gidx = 0;
  document.getElementById('playTitle').textContent = f.name;
  document.getElementById('pbFloor').textContent = (FLOORS.findIndex(x => x.key === gs.floorKey) + 1) + 'F';
  document.getElementById('pbLv').textContent = 'レベル' + gs.level;
  renderProg();
  document.getElementById('qPoly').innerHTML = gs.q.polyHTML;
  document.getElementById('feedbackArea').innerHTML = '';
  renderDirect();
}
function renderProg() {
  document.getElementById('pbProg').innerHTML = Array.from({ length: NEED_PER_LEVEL }, (_, i) => `<span class="pb-pip ${i < gs.correctInLevel ? 'on' : ''}"></span>`).join('');
}

// 因数分解テンプレ
function templateHTML(type) {
  const B = (i) => `<input class="blank" id="ans${i}" type="text" inputmode="numeric" autocomplete="off">`;
  if (type === 'common') return `${B(0)}<span class="paren">x(</span>${B(1)}<span class="paren">x +</span> ${B(2)}<span class="paren">)</span>`;
  if (type === 'sumprod') return `<span class="paren">( x +</span> ${B(0)} <span class="paren">)( x +</span> ${B(1)} <span class="paren">)</span>`;
  if (type === 'square') return `<span class="paren">( x +</span> ${B(0)} <span class="paren">)</span><sup>2</sup>`;
  if (type === 'diff') return `<span class="paren">( x +</span> ${B(0)} <span class="paren">)( x −</span> ${B(1)} <span class="paren">)</span>`;
  return `<span class="paren">(</span>${B(0)}<span class="paren">x +</span> ${B(1)} <span class="paren">)(</span>${B(2)}<span class="paren">x +</span> ${B(3)}<span class="paren">)</span>`;
}
function readBlanks(type) {
  const n = blanksCount(type); const v = [];
  for (let i = 0; i < n; i++) {
    const raw = document.getElementById('ans' + i).value.trim();
    if (raw === '' || !/^-?\d+$/.test(raw)) return null;
    v.push(parseInt(raw, 10));
  }
  return v;
}
function renderDirect() {
  gs.mode = 'direct';
  const hint = gs.q.type === 'common' ? '前の□＝共通でくくる数。マイナスは − をつけてね。' : 'マイナスのときは − をつけてね（例：−3）。';
  document.getElementById('answerArea').innerHTML = `<div class="ans-label">因数分解しよう</div><div class="tmpl">${templateHTML(gs.q.type)}</div><div class="ans-hint">${hint}</div>`;
  document.getElementById('feedbackArea').innerHTML = '';
  document.getElementById('actionRow').innerHTML =
    `<button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">こたえあわせ</button>` +
    `<button class="btn btn-ghost" onclick="enterGuided()">💡 1つずつ解く（ガイド）</button>`;
  gs.answered = false;
}

async function checkAnswer() {
  if (gs.answered) return;
  const v = readBlanks(gs.q.type);
  if (!v) { toast('□に数字を入れてね（マイナスは −）'); return; }
  const res = classify(gs.q, v);
  if (res.kind === 'correct') {
    gs.answered = true;
    gs.correctInLevel++; renderProg();
    renderFeedback('correct', 'せいかい！', '🎉', '', gs.q.steps);
    document.getElementById('answerArea').classList.add('hidden');
    const last = gs.correctInLevel >= NEED_PER_LEVEL;
    document.getElementById('actionRow').innerHTML = `<button class="btn ${last ? 'btn-warm' : 'btn-primary'}" onclick="advance()">${last ? 'レベルクリア！ ▶' : 'つぎの問題 ▶'}</button>`;
    return;
  }
  // near / wrong
  let advice;
  if (res.kind === 'near') {
    advice = (gs.q.type === 'common')
      ? `おしい！まだ全部はくくれてないよ。最大の共通因数 <b>${gs.q.fac.g}x</b> でくくろう。`
      : `おしい！式は合ってるけど、各かっこの中にまだ共通な数が残っているかも。`;
  } else {
    advice = diagnoseFactor(gs.q, v, res.ex);
    if (!advice) { const ai = await aiAdvice(v); advice = ai || '順番に：①共通因数 → ②公式やたすき掛け → の形を考えてみよう。'; }
  }
  renderFeedback(res.kind === 'near' ? 'near' : 'wrong', res.kind === 'near' ? 'おしい！' : 'ちがうみたい', res.kind === 'near' ? '🤏' : '🤔', advice, null);
  document.getElementById('actionRow').innerHTML =
    `<button class="btn btn-secondary" onclick="retrySame()">もう一度ためす</button>` +
    `<button class="btn btn-secondary" onclick="enterGuided()">💡 1つずつ解く</button>` +
    `<button class="btn btn-ghost" onclick="revealSteps()">解き方を見る</button>` +
    `<button class="btn btn-ghost" onclick="advance()">つぎの問題 ▶</button>`;
}

function retrySame() { document.getElementById('feedbackArea').innerHTML = ''; document.getElementById('answerArea').classList.remove('hidden'); renderDirect(); }

// ══ ガイド ══
function enterGuided() {
  gs.mode = 'guided'; gs.gidx = 0; gs.answered = false;
  document.getElementById('answerArea').classList.remove('hidden');
  document.getElementById('feedbackArea').innerHTML = '';
  renderGuidedStep();
}
function renderGuidedStep() {
  const steps = gs.q.guided, step = steps[gs.gidx];
  const head = `<div class="guide-head">1つずつ解く — ステップ ${gs.gidx + 1} / ${steps.length}</div>`;
  if (step.answer) {
    document.getElementById('answerArea').innerHTML = head + `<div class="guide-prompt">${step.prompt}</div><div class="tmpl">${templateHTML(gs.q.type)}</div><div class="ans-hint">マイナスは − をつけてね。</div>`;
    document.getElementById('actionRow').innerHTML =
      `<button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">こたえあわせ</button>` +
      `<button class="btn btn-ghost" onclick="renderDirect()">直接入力にもどる</button>`;
  } else {
    let blanks = '';
    for (let i = 0; i < step.n; i++) blanks += `<input class="gblank" id="g${i}" type="text" inputmode="numeric" autocomplete="off">` + (i < step.n - 1 ? '<span style="color:var(--sub)">×</span>' : '');
    document.getElementById('answerArea').innerHTML = head + `<div class="guide-prompt">${step.prompt}</div><div class="gblanks">${blanks}</div>`;
    document.getElementById('actionRow').innerHTML =
      `<button class="btn btn-primary" onclick="checkGuidedStep()">確認</button>` +
      `<button class="btn btn-ghost" onclick="guidedHint()">💡 ヒント</button>` +
      `<button class="btn btn-ghost" onclick="renderDirect()">直接入力にもどる</button>`;
  }
  document.getElementById('feedbackArea').innerHTML = '';
}
function guidedHint() { renderFeedback('near', 'ヒント', '💡', gs.q.guided[gs.gidx].hint, null); }
function checkGuidedStep() {
  const step = gs.q.guided[gs.gidx]; const v = [];
  for (let i = 0; i < step.n; i++) { const raw = document.getElementById('g' + i).value.trim(); if (raw === '' || !/^-?\d+$/.test(raw)) { toast('□に数字を入れてね'); return; } v.push(parseInt(raw, 10)); }
  if (step.validate(v)) {
    renderFeedback('correct', 'いいね！', '✅', step.explain(v), null);
    document.getElementById('actionRow').innerHTML = `<button class="btn btn-primary" onclick="advanceGuided()">つぎへ ▶</button>`;
  } else {
    renderFeedback('wrong', 'もう一度', '🤔', step.advice, null);
  }
}
function advanceGuided() { gs.gidx++; renderGuidedStep(); }

function genericNextButtons() {}
function advance() {
  if (gs.correctInLevel >= NEED_PER_LEVEL) {
    const p = save.progress[gs.floorKey]; const wasLevel = gs.level;
    if (!p.cleared) {
      if (wasLevel >= LEVELS_PER_FLOOR) { p.cleared = true; p.level = LEVELS_PER_FLOOR; }
      else if (wasLevel >= p.level) { p.level = wasLevel + 1; }
      writeSave();
    }
    showClear(wasLevel, p.cleared); return;
  }
  document.getElementById('answerArea').classList.remove('hidden');
  nextProblem();
}

function renderFeedback(kind, title, icon, advice, steps) {
  let html = `<div class="fb fb-${kind}"><div class="fb-title">${icon} ${title}</div>`;
  if (advice) html += `<div class="fb-advice">${advice}</div>`;
  html += `</div>`;
  if (steps) html += stepsHTML(steps);
  document.getElementById('feedbackArea').innerHTML = html;
}
function stepsHTML(steps) { return `<div class="steps-box"><div class="steps-title">解き方</div>` + steps.map((s, i) => `<div class="step"><span class="step-no">${i + 1}</span><span>${s}</span></div>`).join('') + `</div>`; }
function revealSteps() { if (!document.getElementById('revealedSteps')) { const d = document.createElement('div'); d.id = 'revealedSteps'; d.innerHTML = stepsHTML(gs.q.steps); document.getElementById('feedbackArea').appendChild(d); } }

function showClear(level, floorCleared) {
  const f = FLOORS.find(x => x.key === gs.floorKey); const fi = FLOORS.findIndex(x => x.key === gs.floorKey);
  launchConfetti();
  if (floorCleared) {
    document.getElementById('clearIcon').textContent = '👑';
    document.getElementById('clearTitle').textContent = `${f.name} クリア！`;
    const allDone = FLOORS.every(x => save.progress[x.key].cleared);
    document.getElementById('clearMsg').innerHTML = allDone ? 'すべてのフロアを制覇した！<br>君は<b>因数分解マスター</b>だ！🎓' : `${fi + 1}F をクリア！つぎのフロアがひらいたよ。`;
    document.getElementById('clearNextBtn').textContent = 'マップへ ▶'; gs._next = 'map';
  } else {
    document.getElementById('clearIcon').textContent = '⭐';
    document.getElementById('clearTitle').textContent = `レベル${level} クリア！`;
    document.getElementById('clearMsg').innerHTML = `よくできました！<br>つぎは <b>レベル${level + 1}</b>（少しむずかしくなるよ）。`;
    document.getElementById('clearNextBtn').textContent = `レベル${level + 1}へ ▶`; gs._next = 'continue';
  }
  showScreen('clearScreen');
}
function afterClear() {
  if (gs._next === 'map') { renderMap(); showScreen('mapScreen'); return; }
  gs.level = save.progress[gs.floorKey].level; gs.correctInLevel = 0;
  document.getElementById('answerArea').classList.remove('hidden');
  nextProblem(); showScreen('playScreen');
}
function resetProgress() { if (!confirm('進み具合を最初からにします。よろしいですか？')) return; save = defaultSave(); save.name = playerName; writeSave(); renderMap(); toast('リセットしました'); }

// ══ AIアドバイス（任意）══
async function aiAdvice(v) {
  if (!AI_ADVICE_URL) return null;
  const problem = gs.q.polyHTML.replace(/<\/?sup>/g, '^').replace('^2', '²');
  const ctrl = new AbortController(); const timer = setTimeout(() => ctrl.abort(), 15000);
  try {
    const res = await fetch(AI_ADVICE_URL, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ topic: 'factoring', problem, type: gs.q.type, student: v.join(',') }), signal: ctrl.signal });
    if (!res.ok) return null; const d = await res.json();
    return (d && typeof d.advice === 'string' && d.advice.trim()) ? d.advice.trim() : null;
  } catch { return null; } finally { clearTimeout(timer); }
}

// ══ 演出 ══
function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
function launchConfetti() {
  let c = document.getElementById('confetti'); if (!c) { c = document.createElement('div'); c.id = 'confetti'; document.body.appendChild(c); } c.innerHTML = '';
  const cols = ['#818cf8', '#f0a35a', '#ffd700', '#44dd99', '#60a5fa', '#ff8fab'];
  for (let i = 0; i < 80; i++) { const p = document.createElement('div'); p.className = 'confetti-piece'; p.style.left = (Math.random() * 100) + 'vw'; p.style.background = cols[Math.floor(Math.random() * cols.length)]; p.style.animationDuration = (1.8 + Math.random() * 1.6) + 's'; p.style.animationDelay = (Math.random() * 0.4) + 's'; if (Math.random() < 0.5) p.style.borderRadius = '50%'; c.appendChild(p); }
  setTimeout(() => { if (c) c.innerHTML = ''; }, 4200);
}
document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('playScreen').classList.contains('active') && !gs.answered && gs.mode === 'direct') checkAnswer(); });

window.addEventListener('DOMContentLoaded', () => { loadSave(); if (save.name) document.getElementById('nameInput').value = save.name; showScreen('titleScreen'); });
</script>
