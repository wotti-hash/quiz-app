<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地理クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; color: #fff; transition: background 0.5s; }
.wrap { max-width: 480px; margin: 0 auto; padding: 0 12px 48px; position: relative; z-index: 1; }
.bg-grid { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.bg-grid div { position: absolute; width: 100%; height: 100%; }
.card { border-radius: 16px; padding: 20px 18px; margin-top: 14px; box-shadow: 0 4px 24px #00000040; }
button { font-family: inherit; cursor: pointer; transition: all 0.2s; }
.btn-fill { border: none; color: #fff; font-weight: 700; font-size: 14px; padding: 10px 18px; border-radius: 10px; }
.btn-outline { background: transparent; font-weight: 700; font-size: 14px; padding: 10px 18px; border-radius: 10px; border-width: 2px; border-style: solid; }
.opt-btn { width: 100%; padding: 12px 14px; border-radius: 10px; color: #fff; font-weight: 600; font-size: 14px; text-align: left; margin-bottom: 8px; border: 1.5px solid #ffffff20; background: #ffffff10; }
.opt-btn.correct { background: #22c55e; border-color: #22c55e; cursor: default; }
.opt-btn.wrong   { background: #ef4444; border-color: #ef4444; cursor: default; }
.opt-btn.dim     { cursor: default; opacity: 0.5; }
.opt-lbl { opacity: 0.5; margin-right: 8px; }
.progress-bar { height: 4px; background: #ffffff15; border-radius: 2px; margin-bottom: 14px; }
.progress-fill { height: 4px; border-radius: 2px; transition: width 0.5s; }
.badge { font-size: 12px; padding: 3px 8px; border-radius: 6px; }
.hint-box { font-size: 13px; opacity: 0.7; background: #ffffff10; border-radius: 8px; padding: 8px 14px; text-align: center; margin-top: 10px; }
.ai-box { border-radius: 16px; padding: 16px 18px; margin-top: 12px; border-width: 1px; border-style: solid; }
.dots { display: inline-flex; gap: 4px; align-items: center; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #aaa; display: inline-block; animation: bounce 0.9s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:scale(1)} 40%{transform:scale(1.5)} }
.cat-btn { padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; }
.perfect-banner { margin-top: 12px; background: #ffd70030; border: 1.5px solid #ffd700; border-radius: 10px; padding: 10px 16px; font-size: 14px; color: #ffd700; text-align: center; }
.cat-bar-wrap { margin-bottom: 8px; }
.cat-bar-track { height: 6px; background: #ffffff15; border-radius: 3px; }
.cat-bar-fill { height: 6px; border-radius: 3px; transition: width 1s; }
.log-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #ffffff10; font-size: 13px; }
.log-ans { font-size: 11px; opacity: 0.5; margin-left: auto; white-space: nowrap; }
.result-btns { display: flex; flex-direction: column; gap: 10px; margin: 20px 0 0; }
.hidden { display: none; }

  /* ホームボタン */
  .home-btn {
    position: fixed; top: 12px; left: 12px; z-index: 999;
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 20px; border: none;
    font-family: inherit; font-size: 12px; font-weight: 700;
    cursor: pointer; text-decoration: none;
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.8);
    backdrop-filter: blur(8px);
    transition: all 0.2s;
  }
  .home-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }
</style>
</head>
<body>

<a class="home-btn" href="index.html">🏠 ホーム</a>



<div class="bg-grid" id="bgGrid"></div>

<!-- ホーム画面 -->
<div class="wrap" id="homeScreen">
  <div style="text-align:center;padding:32px 0 16px">
    <div style="font-size:48px">🌐</div>
    <h1 id="homeTitle" style="font-size:26px;font-weight:900;letter-spacing:2px;margin:8px 0 4px">地理クイズ</h1>
    <p style="font-size:13px;opacity:0.5">Geography Quiz</p>
  </div>
  <div class="card" id="homeCard">
    <p style="font-size:13px;opacity:0.6;margin-bottom:10px">📍 エリア選択</p>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn-fill" id="areaWorld" onclick="setArea('world')" style="flex:1;font-size:13px">🌍 世界</button>
      <button class="btn-outline" id="areaJapan" onclick="setArea('japan')" style="flex:1;font-size:13px">🗾 日本</button>
      <button class="btn-outline" id="areaAll" onclick="setArea('all')" style="flex:1;font-size:13px">🌏 すべて</button>
    </div>
    <div id="catSection">
      <p style="font-size:13px;opacity:0.6;margin-bottom:8px">🏷️ カテゴリ</p>
      <div id="catButtons" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px"></div>
    </div>
    <div style="text-align:center;padding:12px 0 4px;opacity:0.5;font-size:13px">
      出題数: <strong id="qCount" style="font-weight:900"></strong> 問
    </div>
    <div id="weakSection" class="hidden" style="margin-bottom:12px">
      <p style="font-size:13px;opacity:0.6;margin-bottom:8px">🔥 苦手ジャンル（正答率の低い順）</p>
      <div id="weakCatList" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn-fill" id="startBtn" onclick="startQuiz()" style="flex:1;padding:14px;font-size:16px">スタート 🚀</button>
      <button class="btn-outline" id="weakBtn" onclick="startWeakMode()" style="padding:14px;font-size:13px;white-space:nowrap" title="苦手ジャンルを優先出題">🔥 苦手優先</button>
    </div>
  </div>
</div>

<!-- クイズ画面 -->
<div class="wrap hidden" id="quizScreen">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 4px 8px">
    <div id="qIndex" style="font-size:13px;opacity:0.5"></div>
    <div style="display:flex;gap:10px;align-items:center">
      <span id="streakBadge" style="font-size:13px;color:#f97316;font-weight:700;display:none"></span>
      <span id="scoreDisp" style="font-size:15px;font-weight:700"></span>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="card" id="quizCard">
    <div style="display:flex;justify-content:space-between;margin-bottom:12px">
      <span class="badge" id="qCategory"></span>
      <span style="font-size:12px;opacity:0.5" id="qDifficulty"></span>
    </div>
    <div style="font-size:40px;text-align:center;margin-bottom:10px" id="qEmoji"></div>
    <p style="font-size:17px;font-weight:700;text-align:center;line-height:1.6;margin-bottom:16px" id="qText"></p>
    <div id="optButtons"></div>
  </div>
  <div id="hintArea" style="text-align:center;margin-top:10px"></div>
  <div class="ai-box hidden" id="aiBox">
    <p style="font-size:12px;margin-bottom:6px" id="aiLabel">🤖 AI解説</p>
    <div id="aiContent"></div>
  </div>
  <button class="btn-fill hidden" id="nextBtn" onclick="nextQuestion()" style="display:block;width:100%;padding:14px;font-size:16px;margin-top:14px"></button>
</div>

<!-- 結果画面 -->
<div class="wrap hidden" id="resultScreen">
  <div style="text-align:center;padding:32px 0 16px">
    <div style="font-size:56px" id="resultEmoji"></div>
    <h2 style="margin:8px 0 4px;font-size:24px" id="resultTitle">結果発表</h2>
    <div style="font-size:40px;font-weight:900" id="resultScore"></div>
    <div style="opacity:0.6;font-size:14px" id="resultSub"></div>
    <div class="perfect-banner hidden" id="perfectBanner">🎉 全問正解！パーフェクト！</div>
  </div>
  <div class="card" id="catStatsCard">
    <p style="font-size:13px;opacity:0.6;margin-bottom:10px">📊 カテゴリ別正答率</p>
    <div id="catStats"></div>
  </div>
  <div class="card" id="logCard" style="margin-top:14px">
    <p style="font-size:13px;opacity:0.6;margin-bottom:10px">📋 解答ログ</p>
    <div id="answerLog"></div>
  </div>
  <div class="result-btns">
    <button class="btn-fill hidden" id="retryWrongBtn" onclick="retryWrong()" style="width:100%;padding:14px;font-size:16px;background:#ef4444;border:none"></button>
    <button class="btn-outline" id="restartBtn" onclick="showHome()" style="width:100%;padding:14px;font-size:16px">🏠 トップに戻る</button>
  </div>
</div>

<script>
// ── 問題データ ──────────────────────────────────────────────
const WORLD_QUESTIONS = [
  { id:1, category:"首都", difficulty:"易", region:"world", question:"オーストラリアの首都は？", options:["シドニー","メルボルン","キャンベラ","ブリスベン"], answer:2, emoji:"🦘", hint:"シドニーでもメルボルンでもない、計画都市", link: "https://ja.wikipedia.org/wiki/キャンベラ", explanation_correct: "シドニーはオーストラリア最大の都市だが首都ではない。1908年に両都市の妥協案として内陸のキャンベラが選ばれた。", explanation_wrong: "シドニーやメルボルンが有名だが、首都は内陸の計画都市キャンベラ。" },
  { id:2, category:"地形", difficulty:"中", region:"world", question:"世界最長の川は？", options:["アマゾン川","ナイル川","長江","ミシシッピ川"], answer:1, emoji:"🌊", hint:"アフリカ大陸を流れる", link: "https://ja.wikipedia.org/wiki/ナイル川", explanation_correct: "全長約6650kmのナイル川はアフリカ大陸北部を流れ、地中海に注ぐ。アマゾン川は流量では世界最大。", explanation_wrong: "アフリカを流れるナイル川が正解。アマゾン川は流量最大だが長さではナイルに次ぐ。" },
  { id:3, category:"面積", difficulty:"易", region:"world", question:"世界最大の国（面積）は？", options:["カナダ","中国","アメリカ","ロシア"], answer:3, emoji:"🌍", hint:"ユーラシア大陸に広がる", link: "https://ja.wikipedia.org/wiki/ロシア", explanation_correct: "ロシアの面積は約1710万km²で、日本の約45倍。2位カナダの約2倍もある。", explanation_wrong: "ロシアが正解。日本の約45倍という広大な国土を持つ。" },
  { id:4, category:"山岳", difficulty:"易", region:"world", question:"世界最高峰の山は？", options:["K2","マカルー","エベレスト","カンチェンジュンガ"], answer:2, emoji:"⛰️", hint:"ヒマラヤ山脈にある", link: "https://ja.wikipedia.org/wiki/エベレスト", explanation_correct: "エベレストの標高は8849m（2020年測量）。チベット語では「チョモランマ」、ネパール語では「サガルマータ」とも呼ばれる。", explanation_wrong: "ヒマラヤ山脈のエベレスト（8849m）が正解。K2は世界第2位。" },
  { id:5, category:"海洋", difficulty:"中", region:"world", question:"世界最大の海洋は？", options:["大西洋","インド洋","北極海","太平洋"], answer:3, emoji:"🌏", hint:"日本の東に広がる", link: "https://ja.wikipedia.org/wiki/太平洋", explanation_correct: "太平洋の面積は約1億6500万km²で、全陸地面積の合計より広い。深さも世界最深のマリアナ海溝（約11000m）を持つ。", explanation_wrong: "太平洋が正解。全陸地面積より広く、世界最深のマリアナ海溝もある。" },
  { id:6, category:"首都", difficulty:"難", region:"world", question:"カザフスタンの首都は？", options:["アルマティ","アスタナ","タシケント","ビシュケク"], answer:1, emoji:"🏙️", hint:"かつてヌルスルタンと改名されたが再び改名", link: "https://ja.wikipedia.org/wiki/アスタナ", explanation_correct: "アスタナは2019年に初代大統領の名をとり「ヌルスルタン」に改名されたが、2022年に再びアスタナに戻った。", explanation_wrong: "カザフスタンの首都はアスタナ。アルマティは旧首都で現在も最大都市。" },
  { id:7, category:"人口", difficulty:"中", region:"world", question:"人口が世界最多の国は？（2023年時点）", options:["中国","インド","アメリカ","インドネシア"], answer:1, emoji:"👥", hint:"2023年に中国を抜いた", link: "https://ja.wikipedia.org/wiki/インド", explanation_correct: "インドは2023年に中国を抜き人口世界1位に。14億人超で、2050年頃まで増加傾向が続くと予測される。", explanation_wrong: "2023年にインドが中国を抜いて世界1位に。現在約14億人。" },
  { id:8, category:"島", difficulty:"中", region:"world", question:"世界最大の島は？", options:["ニューギニア島","ボルネオ島","グリーンランド","マダガスカル"], answer:2, emoji:"🏝️", hint:"デンマーク領の北極に近い島", link: "https://ja.wikipedia.org/wiki/グリーンランド", explanation_correct: "グリーンランドは面積約216万km²でデンマーク領。面積の約80%が氷床に覆われており、実際の居住可能面積は小さい。", explanation_wrong: "グリーンランドが正解。デンマーク領で面積の8割が氷床に覆われている。" },
  { id:9, category:"砂漠", difficulty:"中", region:"world", question:"世界最大の砂漠は？（熱砂漠以外も含む）", options:["サハラ砂漠","アラビア砂漠","南極大陸","ゴビ砂漠"], answer:2, emoji:"🏜️", hint:"実は氷の砂漠が最大", link: "https://ja.wikipedia.org/wiki/南極大陸", explanation_correct: "南極大陸は約1400万km²の氷の砂漠。熱砂漠最大のサハラ砂漠（約900万km²）より広い。降水量が極めて少ない点が砂漠の定義を満たす。", explanation_wrong: "砂漠の定義は「乾燥」。南極大陸は熱砂漠のサハラより広い氷の砂漠。" },
  { id:10, category:"湖", difficulty:"難", region:"world", question:"世界最深の湖は？", options:["カスピ海","バイカル湖","タンガニーカ湖","スペリオル湖"], answer:1, emoji:"💧", hint:"ロシア・シベリアにある", link: "https://ja.wikipedia.org/wiki/バイカル湖", explanation_correct: "バイカル湖の最深部は1637m。世界の淡水の約20%を蓄え、2500万年以上前に形成された世界最古の湖でもある。", explanation_wrong: "バイカル湖が正解。ロシア・シベリアにあり最深1637m、世界の淡水の約20%を占める。" },
  { id:11, category:"首都", difficulty:"難", region:"world", question:"ブラジルの首都は？", options:["リオデジャネイロ","サンパウロ","ブラジリア","サルバドール"], answer:2, emoji:"🇧🇷", hint:"1960年に遷都された計画都市", link: "https://ja.wikipedia.org/wiki/ブラジリア", explanation_correct: "ブラジリアは1960年に当時の首都リオデジャネイロから遷都。都市全体がユネスコ世界文化遺産に登録されている。", explanation_wrong: "ブラジルの首都はブラジリア。リオデジャネイロは旧首都で有名な観光都市。" },
  { id:12, category:"地形", difficulty:"難", region:"world", question:"世界最長の山脈は？", options:["ロッキー山脈","ヒマラヤ山脈","アンデス山脈","アルプス山脈"], answer:2, emoji:"🗻", hint:"南アメリカ大陸の西岸を縦断", link: "https://ja.wikipedia.org/wiki/アンデス山脈", explanation_correct: "アンデス山脈は全長約7500kmで南アメリカ西岸を縦断。ロッキー山脈（約4800km）やヒマラヤ山脈（約2400km）より長い。", explanation_wrong: "アンデス山脈が正解。南米西岸を約7500km縦断する世界最長の山脈。" },
  { id:13, category:"首都", difficulty:"難", region:"world", question:"エチオピアの首都は？", options:["ナイロビ","アジスアベバ","カイロ","ハルツーム"], answer:1, emoji:"🦁", hint:"アフリカ連合本部が置かれる都市", link: "https://ja.wikipedia.org/wiki/アディスアベバ", explanation_correct: "アジスアベバはアフリカ連合（AU）の本部が置かれ「アフリカの首都」とも呼ばれる。標高約2355mの高地都市。", explanation_wrong: "エチオピアの首都はアジスアベバ。アフリカ連合本部が置かれる。" },
  { id:14, category:"首都", difficulty:"難", region:"world", question:"ミャンマーの首都は？", options:["ヤンゴン","マンダレー","ネピドー","バゴー"], answer:2, emoji:"🛕", hint:"2006年に新設された計画都市", link: "https://ja.wikipedia.org/wiki/ネピドー", explanation_correct: "ネピドーは2006年に突然発表された新首都。旧首都ヤンゴンより内陸に位置し、計画的に建設された。", explanation_wrong: "ミャンマーの首都はネピドー。2006年に旧首都ヤンゴンから遷都された計画都市。" },
  { id:15, category:"首都", difficulty:"難", region:"world", question:"モロッコの首都は？", options:["カサブランカ","マラケシュ","フェズ","ラバト"], answer:3, emoji:"🕌", hint:"最大都市はカサブランカだが首都ではない", link: "https://ja.wikipedia.org/wiki/ラバト", explanation_correct: "モロッコ最大の都市はカサブランカだが首都はラバト。映画「カサブランカ」で有名な都市と混同しやすい。", explanation_wrong: "モロッコの首都はラバト。最大都市カサブランカとの混同に注意。" },
  { id:16, category:"首都", difficulty:"難", region:"world", question:"ウズベキスタンの首都は？", options:["サマルカンド","タシケント","ブハラ","ヒヴァ"], answer:1, emoji:"🏛️", hint:"中央アジア最大の都市", link: "https://ja.wikipedia.org/wiki/タシュケント", explanation_correct: "タシケントは中央アジア最大の都市。古くはシルクロードの要衝として栄えた。", explanation_wrong: "ウズベキスタンの首都はタシケント。中央アジア最大の都市。" },
  { id:17, category:"首都", difficulty:"難", region:"world", question:"スリランカの立法府がある都市は？", options:["コロンボ","スリジャヤワルダナプラコッテ","キャンディ","ゴール"], answer:1, emoji:"🌿", hint:"世界で最も長い首都名の一つ", link: "https://ja.wikipedia.org/wiki/スリジャヤワルダナプラコッテ", explanation_correct: "スリジャヤワルダナプラコッテは世界で最も長い首都名のひとつ。行政上の首都だが、最大都市コロンボが事実上の中心都市。", explanation_wrong: "スリランカの首都（立法府所在地）はスリジャヤワルダナプラコッテ。コロンボは最大の商業都市。" },
  { id:18, category:"首都", difficulty:"中", region:"world", question:"アルゼンチンの首都は？", options:["サンティアゴ","リマ","ブエノスアイレス","モンテビデオ"], answer:2, emoji:"💃", hint:"タンゴ発祥の都市", link: "https://ja.wikipedia.org/wiki/ブエノスアイレス", explanation_correct: "ブエノスアイレスは「南米のパリ」と呼ばれる。タンゴ発祥の地でもあり、南米最大級の都市のひとつ。", explanation_wrong: "アルゼンチンの首都はブエノスアイレス。タンゴ発祥の「南米のパリ」。" },
  { id:19, category:"首都", difficulty:"中", region:"world", question:"ナイジェリアの首都は？", options:["ラゴス","アブジャ","カノ","イバダン"], answer:1, emoji:"🌍", hint:"1991年にラゴスから遷都された", link: "https://ja.wikipedia.org/wiki/アブジャ", explanation_correct: "アブジャは1991年にラゴスから遷都された計画都市。ナイジェリアはアフリカ最多人口を誇る。", explanation_wrong: "ナイジェリアの首都はアブジャ。1991年にラゴスから遷都された。" },

// カテゴリ別の累積正誤データ（セッション内で蓄積）
const catStatsGlobal = {}; // { "首都": { ok:3, total:5 }, ... }

function getCatRank() {
  // 正答率が低い順にカテゴリを返す（5問以上解いたカテゴリのみ対象）
  return Object.entries(catStatsGlobal)
    .filter(([, s]) => s.total >= 3)
    .sort(([, a], [, b]) => (a.ok / a.total) - (b.ok / b.total))
    .map(([cat, s]) => ({ cat, rate: Math.round(s.ok / s.total * 100), total: s.total }));
}

function recordAnswer(category, isCorrect) {
  if (!catStatsGlobal[category]) catStatsGlobal[category] = { ok: 0, total: 0 };
  catStatsGlobal[category].total++;
  if (isCorrect) catStatsGlobal[category].ok++;
}

function fetchExplanation(question, selectedIdx, isCorrect) {
  if (isCorrect) {
    return Promise.resolve("✅ " + (question.explanation_correct ?? question.hint));
  } else {
    return Promise.resolve("💡 正解は「" + question.options[question.answer] + "」。" + (question.explanation_wrong ?? question.hint));
  }
}

// ── クイズ開始 ────────────────────────────────────────────
function weightedShuffle(pool, seenIds) {
  // 未出題は重み3、出題済みは重み1で選ばれやすさを調整
  const weighted = [];
  pool.forEach(q => {
    const w = seenIds.has(q.id) ? 1 : 3;
    for (let i = 0; i < w; i++) weighted.push(q);
  });
  // Fisher-Yatesシャッフル後、重複除去して先頭20問
  const shuffled = weighted.sort(() => Math.random() - 0.5);
  const seen = new Set();
  const result = [];
  for (const q of shuffled) {
    if (!seen.has(q.id)) { seen.add(q.id); result.push(q); }
    if (result.length >= 20) break;
  }
  return result;
}

function startQuiz(questions) {
  const area = state.area;
  let pool;
  if (questions) {
    // 間違えた問題再挑戦時はそのまま使う（20問制限のみ適用）
    pool = questions.slice(0, 20);
    state.questions = [...pool].sort(() => Math.random() - 0.5);
  } else {
    const base = area === "world" ? ALL_WORLD : area === "japan" ? ALL_JAPAN : ALL_QUESTIONS;
    pool = state.cat === "すべて" ? base : base.filter(q => q.category === state.cat);
    state.questions = weightedShuffle(pool, state.seenIds);
  }
  // seenIdsを更新
  state.questions.forEach(q => state.seenIds.add(q.id));
  state.dummy = null; // dummy line to avoid extra replacement
  state.current = 0;
  state.score = 0;
  state.streak = 0;
  state.maxStreak = 0;
  state.selected = null;
  state.hintUsed = false;
  state.answers = [];
  state.wrongQuestions = [];

  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  renderQuiz();
}

function retryWrong() {
  startQuiz(state.wrongQuestions);
}

// 苦手ジャンル優先モード：正答率の低いカテゴリから重み付き出題
function startWeakMode() {
  const ranks = getCatRank();
  if (ranks.length === 0) {
    alert("まだデータが不足しています。\n先にいくつか問題を解いてください！");
    return;
  }
  // 正答率が低いカテゴリの問題を優先してプール構築
  const base = state.area === "world" ? ALL_WORLD : state.area === "japan" ? ALL_JAPAN : ALL_QUESTIONS;
  const weakCats = new Set(ranks.map(r => r.cat));
  // 苦手カテゴリの問題は重み3、それ以外は重み1
  const weighted = [];
  base.forEach(q => {
    const w = weakCats.has(q.category) ? 3 : 1;
    for (let i = 0; i < w; i++) weighted.push(q);
  });
  const shuffled = weighted.sort(() => Math.random() - 0.5);
  const seen = new Set();
  const pool = [];
  for (const q of shuffled) {
    if (!seen.has(q.id)) { seen.add(q.id); pool.push(q); }
    if (pool.length >= 20) break;
  }
  state.weakMode = true;
  startQuiz(pool);
}

// 特定カテゴリのみで出題
function startWeakCat(cat) {
  const base = state.area === "world" ? ALL_WORLD : state.area === "japan" ? ALL_JAPAN : ALL_QUESTIONS;
  const pool = base.filter(q => q.category === cat);
  if (pool.length === 0) return;
  state.cat = cat;
  state.weakMode = true;
  startQuiz(pool);
}

// ── クイズ描画 ────────────────────────────────────────────
function renderQuiz() {
  const { questions, current, score, streak } = state;
  const q = questions[current];
  const area = q.region === "japan" ? "japan" : state.area === "all" ? "all" : "world";
  const c = COLORS[area] || COLORS.world;

  document.body.style.background = c.bg;
  renderBg(c.accent);

  document.getElementById("qIndex").textContent = `${current + 1} / ${questions.length}`;
  const scoreDisp = document.getElementById("scoreDisp");
  scoreDisp.textContent = `${score} pt`;
  scoreDisp.style.color = c.accent;

  const streakBadge = document.getElementById("streakBadge");
  if (streak >= 2) { streakBadge.style.display = ""; streakBadge.textContent = `🔥 ${streak}連続`; }
  else { streakBadge.style.display = "none"; }

  const fill = document.getElementById("progressFill");
  fill.style.width = `${((current + 1) / questions.length) * 100}%`;
  fill.style.background = c.accent;

  document.getElementById("quizCard").style.background = c.card;
  const catEl = document.getElementById("qCategory");
  catEl.textContent = q.category;
  catEl.style.background = c.badge;
  catEl.style.color = c.accent;
  document.getElementById("qDifficulty").textContent = q.difficulty;
  document.getElementById("qEmoji").textContent = q.emoji;
  document.getElementById("qText").textContent = q.question;

  // 選択肢
  const optDiv = document.getElementById("optButtons");
  optDiv.innerHTML = "";
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.innerHTML = `<span class="opt-lbl">${["A","B","C","D"][i]}.</span>${opt}`;
    btn.onclick = () => selectAnswer(i);
    optDiv.appendChild(btn);
  });

  // ヒント
  const hintArea = document.getElementById("hintArea");
  hintArea.innerHTML = `<button class="btn-outline" style="font-size:12px;color:${c.accent};border-color:${c.accent};" onclick="showHint()">ヒント（−5pt）</button>`;

  // AI解説・次へ非表示
  document.getElementById("aiBox").classList.add("hidden");
  const nextBtn = document.getElementById("nextBtn");
  nextBtn.classList.add("hidden");
  nextBtn.style.background = c.accent;
  nextBtn.style.display = "block";
}

function showHint() {
  const q = state.questions[state.current];
  state.hintUsed = true;
  document.getElementById("hintArea").innerHTML = `<div class="hint-box">💡 ${q.hint}</div>`;
}

async function selectAnswer(idx) {
  if (state.selected !== null) return;
  state.selected = idx;

  const q = state.questions[state.current];
  const isCorrect = idx === q.answer;
  const pts = isCorrect ? (state.hintUsed ? 5 : 10) : 0;
  state.score += pts;
  state.streak = isCorrect ? state.streak + 1 : 0;
  state.maxStreak = Math.max(state.maxStreak, state.streak);
  state.answers.push({ correct: isCorrect, selected: idx });
  if (!isCorrect) state.wrongQuestions.push(q);
  recordAnswer(q.category, isCorrect);

  // スコア更新
  const area = q.region === "japan" ? "japan" : state.area === "all" ? "all" : "world";
  const c = COLORS[area] || COLORS.world;
  document.getElementById("scoreDisp").textContent = `${state.score} pt`;
  const streakBadge = document.getElementById("streakBadge");
  if (state.streak >= 2) { streakBadge.style.display = ""; streakBadge.textContent = `🔥 ${state.streak}連続`; }
  else { streakBadge.style.display = "none"; }

  // 選択肢の色更新
  const btns = document.getElementById("optButtons").querySelectorAll("button");
  btns.forEach((btn, i) => {
    btn.onclick = null;
    if (i === q.answer) btn.classList.add("correct");
    else if (i === idx) btn.classList.add("wrong");
    else btn.classList.add("dim");
  });

  // ヒント非表示
  document.getElementById("hintArea").innerHTML = "";

  // AI解説エリア表示
  const aiBox = document.getElementById("aiBox");
  aiBox.classList.remove("hidden");
  aiBox.style.borderColor = c.accent + "66";
  document.getElementById("aiLabel").style.color = c.accent;
  document.getElementById("aiContent").innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

  // 次へボタン
  const nextBtn = document.getElementById("nextBtn");
  nextBtn.classList.remove("hidden");
  nextBtn.style.display = "block";
  nextBtn.textContent = state.current + 1 >= state.questions.length ? "結果を見る 🏁" : "次の問題 →";

  // 解説表示
  try {
    const text = await fetchExplanation(q, idx, isCorrect);
    const linkHtml = q.link
      ? `<a href="${q.link}" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;font-size:11px;color:${c.accent};text-decoration:none;border:1px solid ${c.accent}44;padding:3px 10px;border-radius:6px;">🔗 詳しく調べる（Wikipedia）</a>`
      : "";
    document.getElementById("aiContent").innerHTML =
      `<span style="font-size:13px;line-height:1.7">${text}</span>${linkHtml}`;
  } catch(e) {
    document.getElementById("aiContent").textContent = "エラー: " + (e?.message ?? String(e));
  }
}

function nextQuestion() {
  if (state.current + 1 >= state.questions.length) {
    showResult();
  } else {
    state.current++;
    state.selected = null;
    state.hintUsed = false;
    renderQuiz();
  }
}

// ── 結果画面 ──────────────────────────────────────────────
function showResult() {
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");

  const { questions, answers, score, maxStreak, wrongQuestions } = state;
  const correct = answers.filter(a => a.correct).length;
  const area = questions[0]?.region === "japan" ? "japan" : state.area === "all" ? "all" : "world";
  const c = COLORS[area] || COLORS.world;

  document.body.style.background = c.bg;
  renderBg(c.accent);

  document.getElementById("resultEmoji").textContent = correct === questions.length ? "🏆" : correct >= questions.length * 0.7 ? "🥈" : "🎯";
  document.getElementById("resultTitle").style.color = c.accent;
  document.getElementById("resultScore").textContent = `${score} pt`;
  document.getElementById("resultSub").textContent = `${correct}/${questions.length}問正解 · 最大連続 ${maxStreak}🔥`;

  const perfectBanner = document.getElementById("perfectBanner");
  if (correct === questions.length) perfectBanner.classList.remove("hidden");
  else perfectBanner.classList.add("hidden");

  // カテゴリ別
  document.getElementById("catStatsCard").style.background = c.card;
  const catStats = {};
  questions.forEach((q, i) => {
    if (!catStats[q.category]) catStats[q.category] = { ok: 0, total: 0 };
    catStats[q.category].total++;
    if (answers[i]?.correct) catStats[q.category].ok++;
  });
  const statsDiv = document.getElementById("catStats");
  statsDiv.innerHTML = Object.entries(catStats).map(([cat, { ok, total }]) => `
    <div class="cat-bar-wrap">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span>${cat}</span><span style="color:${c.accent}">${ok}/${total}</span>
      </div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="background:${c.accent};width:${(ok/total)*100}%"></div></div>
    </div>`).join("");

  // ログ
  document.getElementById("logCard").style.background = c.card;
  document.getElementById("answerLog").innerHTML = questions.map((q, i) => `
    <div class="log-row">
      <span>${answers[i]?.correct ? "✅" : "❌"}</span>
      <span style="flex:1">${q.question}</span>
      <span class="log-ans">${q.options[q.answer]}</span>
    </div>`).join("");

  // ボタン
  const retryBtn = document.getElementById("retryWrongBtn");
  const restartBtn = document.getElementById("restartBtn");
  if (wrongQuestions.length > 0) {
    retryBtn.classList.remove("hidden");
    retryBtn.textContent = `❌ 間違えた${wrongQuestions.length}問をもう一度`;
  } else {
    retryBtn.classList.add("hidden");
  }
  restartBtn.style.color = c.accent;
  restartBtn.style.borderColor = c.accent;
}

// ── 初期化 ────────────────────────────────────────────────
applyTheme("world");
renderHome();
</script>
